<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>审计日志 - 管理员</title>
  <link rel="stylesheet" href="/public/admin.css">
  <link rel="stylesheet" href="/public/tailwind.min.css">
</head>
<body>

<header class="header-bar">
  <div class="header-inner">
    <div class="header-left">
      <a href="/admin" class="nav-link">
        <svg style="width:16px;height:16px;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
        </svg>
        管理面板
      </a>
      <span style="color: var(--hairline);">|</span>
      <span class="page-title text-lg">审计日志</span>
    </div>
    <div class="header-right">
      <a href="/admin/dashboard" class="nav-link">全局看板</a>
      <a href="/admin/analytics" class="nav-link">数据分析</a>
      <a href="/admin/audit" class="nav-link active">审计日志</a>
      <a href="/teacher/classes" class="nav-link">教师端</a>
      <form method="post" action="/teacher/logout" style="display: inline;">
        <button class="nav-link" type="submit">退出</button>
      </form>
    </div>
  </div>
</header>

<main class="admin-main">

  <div class="card">
    <div class="card-header">
      <p class="card-title">操作日志</p>
    </div>
    <div id="loadingView" class="loading">加载中...</div>
    <div id="dataView" style="display: none;">
      <table class="admin-table" id="logTable">
        <thead><tr>
          <th style="width:140px;">时间</th>
          <th style="width:120px;">操作类型</th>
          <th>操作目标</th>
          <th style="width:100px;">IP</th>
        </tr></thead>
        <tbody id="logBody"></tbody>
      </table>
    </div>
    <div id="pagination" class="pagination" style="display: none;">
      <button id="prevBtn" disabled onclick="changePage(-1)">上一页</button>
      <span class="page-info" id="pageInfo"></span>
      <button id="nextBtn" disabled onclick="changePage(1)">下一页</button>
    </div>
  </div>
</main>

<script>
let currentPage = 1
const LIMIT = 50

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
}

const ACTION_LABELS = {
  CREATE_TEACHER: '创建教师',
  DELETE_TEACHER: '删除教师',
  RESET_PASSWORD: '重置密码',
  BATCH_RESET_PASSWORD: '批量重置密码',
  TRANSFER_CLASS: '班级转交',
  EDIT_CLASS: '编辑班级',
  DELETE_CLASS: '删除班级',
  ARCHIVE_ALL: '一键归档',
  BACKUP: '数据库备份',
  RESTORE: '数据库恢复',
}

function timeCN(dateStr) {
  const d = new Date(dateStr)
  const pad = n => String(n).padStart(2, '0')
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`
}

async function loadPage(page) {
  currentPage = page
  const res = await fetch(`/admin/api/audit-logs?page=${page}&limit=${LIMIT}`)
  if (res.status === 401 || res.status === 403) { window.location.href = '/student'; return }
  const data = await res.json()
  render(data)
}

function render(data) {
  document.getElementById('loadingView').style.display = 'none'
  document.getElementById('dataView').style.display = ''
  document.getElementById('pagination').style.display = ''

  const rows = data.logs.map(log => {
    const label = ACTION_LABELS[log.action] || log.action
    return `<tr>
      <td style="white-space: nowrap; color: var(--muted-soft); font-size: 12px;">${timeCN(log.createdAt)}</td>
      <td><span class="action-badge ${log.action}">${escHtml(label)}</span></td>
      <td style="font-size: 13px;">${escHtml(log.target)}${log.detail ? `<br><span style="color: var(--muted-soft); font-size: 11px;">${escHtml(log.detail)}</span>` : ''}</td>
      <td style="font-size: 12px; color: var(--muted-soft);">${escHtml(log.ip || '-')}</td>
    </tr>`
  }).join('')

  document.getElementById('logBody').innerHTML = rows || '<tr><td colspan="4" class="empty-state">暂无日志</td></tr>'

  const totalPages = Math.ceil(data.total / data.limit)
  document.getElementById('pageInfo').textContent = `第 ${data.page} / ${totalPages || 1} 页（共 ${data.total} 条）`
  document.getElementById('prevBtn').disabled = data.page <= 1
  document.getElementById('nextBtn').disabled = data.page >= totalPages
}

function changePage(delta) {
  const newPage = currentPage + delta
  if (newPage < 1) return
  loadPage(newPage)
}

loadPage(1)
</script>
</body>
</html>
