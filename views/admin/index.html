<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>管理员面板</title>
  <link rel="stylesheet" href="/public/tailwind.min.css">
  <style>
    :root {
      --page-bg:#f6f8fc;
      --card-bg:rgba(255,255,255,.78);
      --card-border:rgba(15,23,42,.08);
      --card-shadow:0 20px 52px rgba(15,23,42,.08);
      --soft-shadow:0 10px 24px rgba(15,23,42,.05);
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
      background:
        radial-gradient(circle at top left, rgba(99,102,241,.10), transparent 26%),
        radial-gradient(circle at top right, rgba(56,189,248,.10), transparent 24%),
        linear-gradient(180deg, #fbfcfe 0%, var(--page-bg) 100%);
    }
    .header-blur { background:rgba(255,255,255,.82); backdrop-filter:blur(18px); }
    .topbar-shell { min-height:84px; padding:16px 0; }
    .nav-link {
      display:inline-flex;align-items:center;gap:8px;padding:10px 12px;border-radius:12px;
      color:#475569;font-size:14px;font-weight:500;transition:all .15s ease;
    }
    .nav-link:hover { background:rgba(255,255,255,.7); color:#0f172a; }
    .nav-title { color:#0f172a;font-size:18px;font-weight:700;letter-spacing:.01em; }
    .nav-action {
      display:inline-flex;align-items:center;justify-content:center;padding:10px 14px;border-radius:12px;
      color:#475569;font-size:14px;font-weight:500;transition:all .15s ease;
    }
    .nav-action:hover { background:rgba(255,255,255,.72); color:#0f172a; }
    .card {
      background:var(--card-bg); border-radius:20px; border:1px solid var(--card-border);
      box-shadow:var(--card-shadow); backdrop-filter:blur(14px);
    }
    .btn {
      display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:8px 14px;border-radius:12px;font-size:13px;font-weight:500;
      transition:all .15s;cursor:pointer;text-decoration:none;box-shadow:var(--soft-shadow);border:none;
    }
    .btn-primary { background:linear-gradient(135deg,#6366f1,#5b6ee8); color:#fff; }
  </style>
</head>
<body class="min-h-screen">

  <!-- 顶栏 -->
  <header class="header-blur border-b border-white/60 sticky top-0 z-20">
    <div class="max-w-3xl mx-auto px-4 topbar-shell flex items-center justify-between gap-4">
      <div class="flex items-center gap-3">
        <a href="/teacher/classes" class="nav-link">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
          </svg>
          教师端
        </a>
        <span class="text-slate-300">/</span>
        <span class="nav-title">管理员面板</span>
      </div>
      <form method="post" action="/teacher/logout">
        <button class="nav-action" type="submit">退出</button>
      </form>
    </div>
  </header>

  <main class="max-w-3xl mx-auto px-4 py-8 space-y-6">

    <!-- 错误提示（从 URL query 参数读取） -->
    <div id="errorBanner" class="hidden px-4 py-3 rounded-xl bg-red-50 border border-red-100 text-sm text-red-600"></div>

    <!-- 通知 -->
    <div id="msg" class="hidden px-4 py-3 rounded-xl text-sm font-medium"></div>

    <!-- 教师列表 -->
    <div class="card overflow-hidden">
      <div class="px-5 py-4 border-b border-slate-50 flex items-center justify-between">
        <p class="text-sm font-medium text-slate-700">教师账号</p>
        <span class="text-xs text-slate-400">{{ teachers | length }} 个账号</span>
      </div>

      <ul class="divide-y divide-slate-50">
        {% for t in teachers %}
        <li class="flex items-center justify-between px-5 py-4 hover:bg-slate-50 transition">
          <div class="flex items-center gap-3 min-w-0">
            <div class="w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center flex-shrink-0">
              <span class="text-xs font-medium text-slate-600">{{ t.username[0] | upper }}</span>
            </div>
            <div class="min-w-0">
              <div class="flex items-center gap-2">
                <span class="text-sm font-medium text-slate-800">{{ t.username }}</span>
                {% if t.isAdmin %}
                <span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-amber-50 text-amber-700 border border-amber-100">管理员</span>
                {% endif %}
              </div>
              <p class="text-xs text-slate-400 mt-0.5">{{ t.classCount }} 个班级</p>
            </div>
          </div>
          <div class="flex items-center gap-2 ml-4">
            <button onclick="resetTeacherPassword({{ t.id }}, '{{ t.username }}')"
              class="text-xs px-3 py-1.5 rounded-lg text-indigo-600 hover:bg-indigo-50 transition flex-shrink-0">改密</button>
            {% if not t.isAdmin %}
            <button onclick="deleteTeacher({{ t.id }}, '{{ t.username }}')"
              class="text-xs px-3 py-1.5 rounded-lg text-red-500 hover:bg-red-50 transition flex-shrink-0">删除</button>
            {% endif %}
          </div>
        </li>
        {% endfor %}
      </ul>
    </div>

    <!-- 创建教师 -->
    <div class="card p-5">
      <p class="text-sm font-medium text-slate-700 mb-4">创建教师账号</p>
      <div class="space-y-3">
        <div>
          <label class="block text-xs text-slate-500 mb-1">用户名</label>
          <input type="text" id="newUsername"
            class="w-full px-4 py-2.5 rounded-xl border border-slate-200 text-slate-800
                   focus:outline-none focus:ring-2 focus:ring-slate-800 focus:border-transparent transition text-sm" />
        </div>
        <div>
          <label class="block text-xs text-slate-500 mb-1">密码</label>
          <input type="password" id="newPassword"
            class="w-full px-4 py-2.5 rounded-xl border border-slate-200 text-slate-800
                   focus:outline-none focus:ring-2 focus:ring-slate-800 focus:border-transparent transition text-sm" />
        </div>
        <div class="flex items-center gap-2">
          <input type="checkbox" id="isAdminCheck"
            class="w-4 h-4 rounded border-slate-300 text-slate-800 focus:ring-slate-800" />
          <label for="isAdminCheck" class="text-sm text-slate-600">设为管理员</label>
        </div>
        <button id="createTeacherBtn" class="btn btn-primary w-full py-2.5">创建账号</button>
      </div>
    </div>

  </main>

<script>
// 读取 URL query 参数中的 error
const params = new URLSearchParams(window.location.search)
const error = params.get('error')
if (error) {
  const banner = document.getElementById('errorBanner')
  banner.textContent = decodeURIComponent(error)
  banner.classList.remove('hidden')
}

const msg = document.getElementById('msg')

function notify(text, ok = true) {
  msg.className = `px-4 py-3 rounded-xl text-sm font-medium ${ok
    ? 'bg-emerald-50 text-emerald-700 border border-emerald-100'
    : 'bg-red-50 text-red-600 border border-red-100'}`
  msg.textContent = text
  msg.classList.remove('hidden')
}

document.getElementById('createTeacherBtn').addEventListener('click', async () => {
  const username = document.getElementById('newUsername').value.trim()
  const password = document.getElementById('newPassword').value
  const isAdmin = document.getElementById('isAdminCheck').checked
  if (!username || !password) { notify('请填写用户名和密码', false); return }
  const res = await fetch('/admin/teachers', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ username, password, isAdmin })
  })
  if (res.status === 401) { window.location.href = '/student'; return }
  const data = await res.json()
  if (data.ok) {
    window.location.reload()
  } else {
    notify(data.message || '创建失败', false)
  }
})

async function deleteTeacher(id, username) {
  if (!confirm(`确认删除教师账号「${username}」？此操作将同时删除其所有班级和数据，不可恢复。`)) return
  const res = await fetch(`/admin/teachers/${id}`, { method: 'DELETE' })
  if (res.status === 401) { window.location.href = '/student'; return }
  const data = await res.json()
  if (data.ok) {
    window.location.reload()
  } else {
    notify(data.message || '删除失败', false)
  }
}

async function resetTeacherPassword(id, username) {
  const password = prompt(`请输入教师账号「${username}」的新密码`)
  if (password == null) return
  const val = password.trim()
  if (!val) {
    notify('新密码不能为空', false)
    return
  }
  const res = await fetch(`/admin/teachers/${id}/password`, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ password: val }),
  })
  if (res.status === 401) { window.location.href = '/student'; return }
  const data = await res.json()
  if (data.ok) {
    notify(`已重置 ${username} 的密码`, true)
  } else {
    notify(data.message || '重置密码失败', false)
  }
}
</script>
</body>
</html>
