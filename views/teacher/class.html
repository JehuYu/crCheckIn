<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ cls.name }} - 签到管理</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .fade { animation: fadeIn .15s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: none; } }
  </style>
</head>
<body class="min-h-screen bg-slate-50">

  <!-- 顶栏 -->
  <header class="bg-white border-b border-slate-100 sticky top-0 z-20">
    <div class="max-w-5xl mx-auto px-4 h-14 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <a href="/teacher/classes" class="text-sm text-slate-400 hover:text-slate-600 transition flex items-center gap-1">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
          </svg>
          班级列表
        </a>
        <span class="text-slate-300">/</span>
        <span class="font-semibold text-slate-800">{{ cls.name }}</span>
      </div>
      <div class="flex items-center gap-2">
        <button id="pwdToggle"
          class="text-sm px-3 py-1.5 rounded-lg text-slate-600 hover:bg-slate-100 transition">修改密码</button>
        <form method="post" action="/teacher/logout">
          <button class="text-sm px-3 py-1.5 rounded-lg text-slate-600 hover:bg-slate-100 transition">退出</button>
        </form>
      </div>
    </div>
  </header>

  <!-- 修改密码面板 -->
  <div id="pwdPanel" class="hidden bg-white border-b border-slate-100">
    <div class="max-w-5xl mx-auto px-4 py-4 fade">
      <p class="text-sm font-medium text-slate-700 mb-3">修改密码</p>
      <div class="flex flex-wrap gap-2 items-end">
        <div>
          <label class="block text-xs text-slate-500 mb-1">旧密码</label>
          <input id="oldPwd" type="password"
            class="px-3 py-2 rounded-lg border border-slate-200 text-sm focus:outline-none focus:ring-2 focus:ring-slate-800 w-40" />
        </div>
        <div>
          <label class="block text-xs text-slate-500 mb-1">新密码</label>
          <input id="newPwd" type="password"
            class="px-3 py-2 rounded-lg border border-slate-200 text-sm focus:outline-none focus:ring-2 focus:ring-slate-800 w-40" />
        </div>
        <button id="changePwdBtn"
          class="px-4 py-2 bg-slate-800 hover:bg-slate-900 text-white text-sm rounded-lg transition">确认修改</button>
      </div>
      <div id="pwdMsg" class="hidden mt-2 text-sm"></div>
    </div>
  </div>

  <main class="max-w-5xl mx-auto px-4 py-6 space-y-5">

    <!-- 统计卡片 -->
    <div class="grid grid-cols-3 gap-4">
      <div class="bg-white rounded-2xl border border-slate-100 p-4 text-center">
        <p class="text-xs text-slate-400 mb-1">总人数</p>
        <p id="totalCount" class="text-3xl font-bold text-slate-800">0</p>
      </div>
      <div class="bg-white rounded-2xl border border-slate-100 p-4 text-center">
        <p class="text-xs text-slate-400 mb-1">已签到</p>
        <p id="signedCount" class="text-3xl font-bold text-emerald-600">0</p>
      </div>
      <div class="bg-white rounded-2xl border border-slate-100 p-4 text-center">
        <p class="text-xs text-slate-400 mb-1">未签到</p>
        <p id="absentCount" class="text-3xl font-bold text-slate-400">0</p>
      </div>
    </div>

    <!-- 时间窗口 -->
    <div class="bg-white rounded-2xl border border-slate-100 p-5">
      <p class="text-sm font-medium text-slate-700 mb-3">签到时间段</p>
      <div class="flex flex-wrap gap-3 items-end">
        <div>
          <label class="block text-xs text-slate-500 mb-1">开始</label>
          <input id="startTime" type="datetime-local"
            class="px-3 py-2 rounded-lg border border-slate-200 text-sm focus:outline-none focus:ring-2 focus:ring-slate-800" />
        </div>
        <div>
          <label class="block text-xs text-slate-500 mb-1">结束</label>
          <input id="endTime" type="datetime-local"
            class="px-3 py-2 rounded-lg border border-slate-200 text-sm focus:outline-none focus:ring-2 focus:ring-slate-800" />
        </div>
        <button id="saveWindow"
          class="px-4 py-2 bg-slate-800 hover:bg-slate-900 text-white text-sm rounded-lg transition">保存</button>
      </div>
      <p id="windowText" class="mt-2 text-xs text-slate-400">当前时间段：不限</p>
    </div>

    <!-- 操作栏 -->
    <div class="bg-white rounded-2xl border border-slate-100 p-5">
      <p class="text-sm font-medium text-slate-700 mb-3">名单 / 记录</p>
      <div class="flex flex-wrap gap-2 items-center">
        <form id="importForm" class="flex gap-2 items-center">
          <input type="file" name="file" accept=".xlsx,.xlsm"
            class="text-sm text-slate-500 file:mr-2 file:py-1.5 file:px-3 file:rounded-lg file:border-0
                   file:text-sm file:bg-slate-100 file:text-slate-700 hover:file:bg-slate-200 cursor-pointer" />
          <button type="submit"
            class="px-4 py-1.5 bg-emerald-600 hover:bg-emerald-700 text-white text-sm rounded-lg transition">导入名单</button>
        </form>
        <a id="exportLink" href="/api/export?classId={{ cls.id }}"
          class="px-4 py-1.5 bg-slate-700 hover:bg-slate-800 text-white text-sm rounded-lg transition">导出记录</a>
        <a href="/teacher/classes/{{ cls.id }}/seats"
          class="px-4 py-1.5 bg-indigo-600 hover:bg-indigo-700 text-white text-sm rounded-lg transition">查看座位表</a>
      </div>
      <div class="flex flex-wrap gap-2 mt-3">
        <button id="resetBtn"
          class="px-4 py-1.5 bg-red-500 hover:bg-red-600 text-white text-sm rounded-lg transition">重置签到</button>
        <button id="clearRosterBtn"
          class="px-4 py-1.5 border border-red-200 text-red-500 hover:bg-red-50 text-sm rounded-lg transition">清空名单</button>
        <a href="/student"
          class="px-4 py-1.5 border border-slate-200 text-slate-600 hover:bg-slate-50 text-sm rounded-lg transition">学生端</a>
      </div>
    </div>

    <!-- 通知 -->
    <div id="msg" class="hidden px-4 py-3 rounded-xl text-sm font-medium fade"></div>

    <!-- 签到名单 -->
    <div class="bg-white rounded-2xl border border-slate-100 overflow-hidden">
      <div class="px-5 py-4 border-b border-slate-50">
        <p class="text-sm font-medium text-slate-700">签到名单</p>
      </div>
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead>
            <tr class="text-xs text-slate-400 border-b border-slate-50">
              <th class="text-left px-5 py-3 font-medium">姓名</th>
              <th class="text-left px-5 py-3 font-medium">行政班级</th>
              <th class="text-left px-5 py-3 font-medium">状态</th>
              <th class="text-left px-5 py-3 font-medium">计算机IP</th>
              <th class="text-left px-5 py-3 font-medium">签到时间</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </div>

    <!-- 历史批次 -->
    <div class="bg-white rounded-2xl border border-slate-100 overflow-hidden">
      <div class="px-5 py-4 border-b border-slate-50 flex items-center justify-between">
        <p class="text-sm font-medium text-slate-700">历史批次</p>
        <span id="sessionCount" class="text-xs text-slate-400"></span>
      </div>
      <div id="sessionList">
        <div class="px-5 py-8 text-center text-sm text-slate-400">暂无历史批次</div>
      </div>
    </div>

    <!-- 历史批次详情弹窗 -->
    <div id="sessionModal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/30">
      <div class="bg-white rounded-2xl shadow-xl w-full max-w-2xl mx-4 max-h-[80vh] flex flex-col">
        <div class="px-5 py-4 border-b border-slate-100 flex items-center justify-between">
          <p id="modalTitle" class="text-sm font-semibold text-slate-800"></p>
          <button id="modalClose" class="text-slate-400 hover:text-slate-600 transition text-lg leading-none">✕</button>
        </div>
        <div class="overflow-auto flex-1">
          <table class="w-full text-sm">
            <thead class="sticky top-0 bg-white">
              <tr class="text-xs text-slate-400 border-b border-slate-100">
                <th class="text-left px-5 py-3 font-medium">姓名</th>
                <th class="text-left px-5 py-3 font-medium">行政班级</th>
                <th class="text-left px-5 py-3 font-medium">计算机IP</th>
                <th class="text-left px-5 py-3 font-medium">签到时间</th>
              </tr>
            </thead>
            <tbody id="modalBody"></tbody>
          </table>
        </div>
      </div>
    </div>

  </main>

<script>
const CLASS_ID = {{ cls.id }}
const msg = document.getElementById('msg')

function notify(text, ok = true) {
  msg.className = `px-4 py-3 rounded-xl text-sm font-medium fade ${ok
    ? 'bg-emerald-50 text-emerald-700 border border-emerald-100'
    : 'bg-red-50 text-red-600 border border-red-100'}`
  msg.textContent = text
  msg.classList.remove('hidden')
  setTimeout(() => msg.classList.add('hidden'), 2500)
}

async function parseResponse(res) {
  if (res.status === 401) { window.location.href = '/teacher/login'; return null }
  return res.json()
}

async function refreshStatus() {
  const res = await fetch(`/api/status?classId=${CLASS_ID}`)
  const data = await parseResponse(res)
  if (!data) return

  document.getElementById('totalCount').textContent = data.totalCount
  document.getElementById('signedCount').textContent = data.signedCount
  document.getElementById('absentCount').textContent = data.absentCount

  document.getElementById('windowText').textContent = data.window.start || data.window.end
    ? `当前时间段：${data.window.start || '不限'} — ${data.window.end || '不限'}`
    : '当前时间段：不限'

  const ipCount = {}
  data.roster.forEach(r => {
    const ip = (r.computerName || '').trim()
    if (ip && ip !== '-') ipCount[ip] = (ipCount[ip] || 0) + 1
  })

  const tbody = document.getElementById('tableBody')
  tbody.innerHTML = ''
  data.roster.forEach(r => {
    const tr = document.createElement('tr')
    tr.className = 'border-b border-slate-50 last:border-0 hover:bg-slate-50 transition'
    const signed = r.status === '已签到'
    const dupIp = ipCount[(r.computerName || '').trim()] > 1
    tr.innerHTML = `
      <td class="px-5 py-3 text-slate-800 font-medium">${r.studentName}</td>
      <td class="px-5 py-3 text-slate-500 text-xs">${r.homeClass || ''}</td>
      <td class="px-5 py-3">
        <span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium
          ${signed ? 'bg-emerald-50 text-emerald-700' : 'bg-slate-100 text-slate-400'}">
          ${r.status}
        </span>
      </td>
      <td class="px-5 py-3 font-mono text-xs ${dupIp ? 'text-red-500 font-bold' : 'text-slate-400'}">${r.computerName}</td>
      <td class="px-5 py-3 text-slate-400 text-xs">${r.signedAt}</td>`
    tbody.appendChild(tr)
  })
}

// 修改密码面板
document.getElementById('pwdToggle').addEventListener('click', () => {
  document.getElementById('pwdPanel').classList.toggle('hidden')
})

document.getElementById('changePwdBtn').addEventListener('click', async () => {
  const pwdMsg = document.getElementById('pwdMsg')
  const res = await fetch('/api/change-password', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      old_password: document.getElementById('oldPwd').value,
      new_password: document.getElementById('newPwd').value
    })
  })
  const data = await parseResponse(res)
  if (!data) return
  pwdMsg.className = `mt-2 text-sm ${data.ok ? 'text-emerald-600' : 'text-red-500'}`
  pwdMsg.textContent = data.message
  pwdMsg.classList.remove('hidden')
  if (data.ok) {
    document.getElementById('oldPwd').value = ''
    document.getElementById('newPwd').value = ''
  }
})

document.getElementById('saveWindow').addEventListener('click', async () => {
  const res = await fetch('/api/window', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      classId: CLASS_ID,
      start_time: document.getElementById('startTime').value || null,
      end_time: document.getElementById('endTime').value || null
    })
  })
  const data = await parseResponse(res)
  if (!data) return
  notify(data.message, data.ok)
  refreshStatus()
})

document.getElementById('resetBtn').addEventListener('click', async () => {
  if (!confirm('确认归档当前签到记录并重置？')) return
  const res = await fetch('/api/reset', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ classId: CLASS_ID })
  })
  const data = await parseResponse(res)
  if (!data) return
  notify(data.message, data.ok)
  refreshStatus()
  refreshSessions()
})

document.getElementById('clearRosterBtn').addEventListener('click', async () => {
  if (!confirm('确认清空名单及全部签到记录？此操作不可恢复。')) return
  const res = await fetch('/api/clear-roster', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ classId: CLASS_ID })
  })
  const data = await parseResponse(res)
  if (!data) return
  notify(data.message, data.ok)
  refreshStatus()
})

document.getElementById('importForm').addEventListener('submit', async e => {
  e.preventDefault()
  const formData = new FormData(e.target)
  formData.append('classId', CLASS_ID)
  const res = await fetch('/api/import', { method: 'POST', body: formData })
  const data = await parseResponse(res)
  if (!data) return
  notify(data.message, data.ok)
  refreshStatus()
})

refreshStatus()
setInterval(refreshStatus, 4000)

// 历史批次
async function refreshSessions() {
  const res = await fetch(`/api/sessions?classId=${CLASS_ID}`)
  if (res.status === 401) return
  const sessions = await res.json()
  const list = document.getElementById('sessionList')
  document.getElementById('sessionCount').textContent = sessions.length ? `${sessions.length} 个批次` : ''
  if (!sessions.length) {
    list.innerHTML = '<div class="px-5 py-8 text-center text-sm text-slate-400">暂无历史批次</div>'
    return
  }
  list.innerHTML = sessions.map(s => `
    <div class="flex items-center justify-between px-5 py-3 border-b border-slate-50 last:border-0 hover:bg-slate-50 transition">
      <div>
        <p class="text-sm text-slate-800">${s.label}</p>
        <p class="text-xs text-slate-400 mt-0.5">已签到 ${s.count} 人</p>
      </div>
      <button onclick="viewSession(${s.id}, '${s.label.replace(/'/g, "\\'")}')"
        class="text-xs px-3 py-1.5 rounded-lg text-indigo-600 hover:bg-indigo-50 transition">查看</button>
    </div>`).join('')
}

async function viewSession(sessionId, label) {
  const res = await fetch(`/api/sessions/${sessionId}`)
  if (res.status === 401) { window.location.href = '/teacher/login'; return }
  const data = await res.json()
  document.getElementById('modalTitle').textContent = label
  const tbody = document.getElementById('modalBody')
  const pad = (n) => String(n).padStart(2, '0')
  const fmt = (d) => { const t = new Date(d); return `${t.getFullYear()}-${pad(t.getMonth()+1)}-${pad(t.getDate())} ${pad(t.getHours())}:${pad(t.getMinutes())}:${pad(t.getSeconds())}` }
  tbody.innerHTML = data.records.map(r => `
    <tr class="border-b border-slate-50 last:border-0">
      <td class="px-5 py-3 font-medium text-slate-800">${r.studentName}</td>
      <td class="px-5 py-3 text-xs text-slate-400">${r.homeClass || ''}</td>
      <td class="px-5 py-3 font-mono text-xs text-slate-400">${r.computerName}</td>
      <td class="px-5 py-3 text-xs text-slate-400">${fmt(r.signedAt)}</td>
    </tr>`).join('')
  document.getElementById('sessionModal').classList.remove('hidden')
}

document.getElementById('modalClose').addEventListener('click', () => {
  document.getElementById('sessionModal').classList.add('hidden')
})
document.getElementById('sessionModal').addEventListener('click', e => {
  if (e.target === document.getElementById('sessionModal')) {
    document.getElementById('sessionModal').classList.add('hidden')
  }
})

refreshSessions()
</script>
</body>
</html>
