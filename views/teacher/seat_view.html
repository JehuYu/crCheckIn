<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ cls.name }} - 座位表</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .seat { min-width: 76px; min-height: 68px; vertical-align: top; }
    .aisle-right { border-right: 2px solid #e2e8f0; padding-right: 8px; margin-right: 4px; }
  </style>
</head>
<body class="min-h-screen bg-slate-50">

  <header class="bg-white border-b border-slate-100 sticky top-0 z-20">
    <div class="max-w-5xl mx-auto px-4 h-14 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <a href="/teacher/classes/{{ classId }}"
          class="text-sm text-slate-400 hover:text-slate-600 transition flex items-center gap-1">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
          </svg>
          返回
        </a>
        <span class="text-slate-300">/</span>
        <span class="font-semibold text-slate-800">{{ cls.name }} 座位表</span>
        <span class="text-xs text-slate-400 ml-1">已签到 {{ signedCount }} 人</span>
      </div>
      <a href="/api/export-seats?classId={{ classId }}"
        class="px-4 py-1.5 bg-indigo-600 hover:bg-indigo-700 text-white text-sm rounded-lg transition">
        导出 Excel
      </a>
    </div>
  </header>

  <main class="max-w-5xl mx-auto px-4 py-6">

    <!-- 视角切换 + 图例 -->
    <div class="flex flex-wrap items-center justify-between gap-3 mb-5">
      <div class="flex gap-5 text-xs text-slate-500">
        <span class="flex items-center gap-1.5">
          <span class="w-3 h-3 rounded bg-emerald-100 border border-emerald-200 inline-block"></span>已签到
        </span>
        <span class="flex items-center gap-1.5">
          <span class="w-3 h-3 rounded bg-white border border-slate-200 inline-block"></span>空位
        </span>
        <span class="flex items-center gap-1.5">
          <span class="w-3 h-3 rounded bg-slate-100 inline-block"></span>无座位
        </span>
        <span class="flex items-center gap-1.5">
          <span class="w-3 h-3 rounded bg-red-100 border border-red-200 inline-block"></span>重复IP
        </span>
      </div>
      <!-- 切换按钮 -->
      <div class="flex rounded-lg border border-slate-200 overflow-hidden text-sm">
        <button id="btnTeacher"
          class="px-4 py-1.5 bg-slate-800 text-white transition">教师视角</button>
        <button id="btnStudent"
          class="px-4 py-1.5 text-slate-600 hover:bg-slate-50 transition">学生视角</button>
      </div>
    </div>

    <div class="bg-white rounded-2xl border border-slate-100 p-5 overflow-x-auto">
      <!-- 讲台（位置由 JS 控制） -->
      <div id="podiumTop" class="hidden flex justify-center mb-6">
        <div class="px-10 py-2 bg-slate-100 rounded-lg text-xs text-slate-500 font-medium tracking-widest">讲台</div>
      </div>

      <table id="seatTable" class="mx-auto border-separate border-spacing-1.5">
        <tbody id="seatBody"></tbody>
      </table>

      <div id="podiumBottom" class="flex justify-center mt-6">
        <div class="px-10 py-2 bg-slate-100 rounded-lg text-xs text-slate-500 font-medium tracking-widest">讲台</div>
      </div>

      <p class="mt-5 text-center text-xs text-slate-400">根据签到 IP 最后一段匹配座位编号</p>
    </div>

  </main>

<script>
const TEACHER_GRID = {{ teacherGridJson | safe }}
const STUDENT_GRID = {{ studentGridJson | safe }}

// 教师视角过道在列 2,4,6 右侧；学生视角在列 1,3,5 右侧
const TEACHER_AISLES = new Set([2, 4, 6])
const STUDENT_AISLES = new Set([1, 3, 5])

let currentView = 'teacher'

function renderGrid(grid, aisles) {
  const tbody = document.getElementById('seatBody')
  tbody.innerHTML = ''
  grid.forEach(row => {
    const tr = document.createElement('tr')
    row.forEach((seat, colIdx) => {
      const td = document.createElement('td')
      td.className = 'seat rounded-xl p-1.5 text-center'

      // 背景色
      if (seat.seatNo === null) {
        td.classList.add('bg-slate-50')
      } else if (seat.dupIp) {
        td.classList.add('bg-red-50', 'border', 'border-red-200')
      } else if (seat.students.length > 0) {
        td.classList.add('bg-emerald-50', 'border', 'border-emerald-100')
      } else {
        td.classList.add('bg-white', 'border', 'border-slate-100')
      }

      // 过道
      if (aisles.has(colIdx)) td.classList.add('aisle-right')

      if (seat.seatNo !== null) {
        let html = `<div class="text-xs text-slate-300 mb-0.5">#${seat.label}</div>`
        seat.students.forEach(stu => {
          if (stu.homeClass) {
            html += `<div class="text-xs text-slate-400 leading-tight">${stu.homeClass}</div>`
          }
          const nameColor = seat.dupIp ? 'text-red-600' : 'text-emerald-700'
          html += `<div class="text-xs font-semibold ${nameColor} leading-tight">${stu.name}</div>`
        })
        td.innerHTML = html
      }
      tr.appendChild(td)
    })
    tbody.appendChild(tr)
  })
}

function setView(view) {
  currentView = view
  const isTeacher = view === 'teacher'

  // 切换按钮样式
  document.getElementById('btnTeacher').className = `px-4 py-1.5 transition ${isTeacher ? 'bg-slate-800 text-white' : 'text-slate-600 hover:bg-slate-50'}`
  document.getElementById('btnStudent').className = `px-4 py-1.5 transition ${!isTeacher ? 'bg-slate-800 text-white' : 'text-slate-600 hover:bg-slate-50'}`

  // 讲台位置：教师视角讲台在下（教师背对讲台看学生），学生视角讲台在上
  document.getElementById('podiumTop').classList.toggle('hidden', isTeacher)
  document.getElementById('podiumBottom').classList.toggle('hidden', !isTeacher)

  renderGrid(isTeacher ? TEACHER_GRID : STUDENT_GRID, isTeacher ? TEACHER_AISLES : STUDENT_AISLES)
}

document.getElementById('btnTeacher').addEventListener('click', () => setView('teacher'))
document.getElementById('btnStudent').addEventListener('click', () => setView('student'))

// 默认教师视角
setView('teacher')
</script>
</body>
</html>
