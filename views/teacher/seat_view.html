<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ cls.name }} - 座位表</title>
  <link rel="stylesheet" href="/public/tailwind.min.css">
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; }
    .seat-card {
      width: 80px; height: 84px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      border-radius: 10px; border: 1.5px solid #e2e8f0; background: #fff;
      transition: box-shadow 0.15s, border-color 0.15s;
      position: relative; overflow: hidden; gap: 2px;
    }
    .seat-card.signed { background: #f0fdf4; border-color: #86efac; }
    .seat-card.dup { background: #fff1f2; border-color: #fca5a5; }
    .seat-card.empty-slot { background: #f8fafc; border: 1.5px dashed #e2e8f0; }
    .seat-card .seat-no { font-size: 10px; color: #cbd5e1; line-height: 1; margin-bottom: 3px; }
    .seat-card.signed .seat-no { color: #86efac; }
    .seat-card.dup .seat-no { color: #fca5a5; }
    .seat-card .home-class {
      font-size: 10px; color: #94a3b8; line-height: 1.2;
      max-width: 72px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; text-align: center;
    }
    .seat-card .stu-name {
      font-size: 12px; font-weight: 600; color: #15803d; line-height: 1.3;
      max-width: 72px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; text-align: center;
    }
    .seat-card.dup .stu-name { color: #dc2626; font-size: 11px; }
    .seat-card.empty-slot .seat-no { color: #e2e8f0; font-size: 13px; margin: 0; }
    .aisle { width: 20px; flex-shrink: 0; }
    .podium {
      display: flex; align-items: center; justify-content: center;
      padding: 8px 48px; background: #f1f5f9; border-radius: 10px;
      font-size: 12px; color: #64748b; font-weight: 600; letter-spacing: 0.15em;
      border: 1.5px solid #e2e8f0;
    }
    @media print {
      body { background: #fff !important; }
      header, .no-print { display: none !important; }
      .print-area { padding: 0 !important; margin: 0 !important; }
      .seat-card { width: 68px !important; height: 72px !important; border-radius: 6px !important;
        -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .seat-card.signed { background: #f0fdf4 !important; border-color: #86efac !important; }
      .seat-card.dup { background: #fff1f2 !important; border-color: #fca5a5 !important; }
      .seat-card.empty-slot { background: #f8fafc !important; }
      .podium { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .print-title { display: block !important; }
    }
    .print-title { display: none; }
  </style>
</head>
<body class="min-h-screen bg-slate-50">

  <header class="bg-white border-b border-slate-100 sticky top-0 z-20 no-print">
    <div class="max-w-6xl mx-auto px-4 h-14 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <a href="/teacher/classes/{{ classId }}"
          class="text-sm text-slate-400 hover:text-slate-600 transition flex items-center gap-1">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
          </svg>
          返回
        </a>
        <span class="text-slate-200">|</span>
        <span class="font-semibold text-slate-800">{{ cls.name }}</span>
        <span class="text-xs bg-emerald-50 text-emerald-600 border border-emerald-100 rounded-full px-2 py-0.5">
          已签到 {{ signedCount }} 人
        </span>
      </div>
      <div class="flex items-center gap-2">
        <!-- 视角切换 -->
        <div class="flex rounded-lg border border-slate-200 overflow-hidden text-sm">
          <button id="btnTeacher" class="px-3 py-1.5 transition">教师视角</button>
          <button id="btnStudent" class="px-3 py-1.5 transition">学生视角</button>
        </div>
        <!-- 刷新状态 -->
        <span id="refreshStatus" class="text-xs text-slate-400 hidden sm:inline"></span>
        <button id="pauseBtn"
          class="px-3 py-1.5 border border-slate-200 text-slate-500 hover:bg-slate-50 text-sm rounded-lg transition">
          暂停刷新
        </button>
        <!-- 打印 -->
        <button onclick="window.print()"
          class="px-3 py-1.5 border border-slate-200 text-slate-500 hover:bg-slate-50 text-sm rounded-lg transition flex items-center gap-1.5">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"/>
          </svg>
          打印
        </button>
        <!-- 导出 -->
        <a href="/api/export-seats?classId={{ classId }}"
          class="px-3 py-1.5 bg-slate-800 hover:bg-slate-900 text-white text-sm rounded-lg transition flex items-center gap-1.5">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
          </svg>
          导出
        </a>
      </div>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-4 py-6 print-area">

    <div class="print-title mb-4">
      <div style="font-size:18px;font-weight:700;color:#1e293b;">{{ cls.name }} 座位表</div>
      <div style="font-size:11px;color:#64748b;margin-top:4px;">已签到 {{ signedCount }} 人</div>
    </div>

    <div class="flex flex-wrap items-center gap-4 mb-5 no-print">
      <div class="flex items-center gap-1.5 text-xs text-slate-500">
        <span class="w-3 h-3 rounded bg-emerald-100 border border-emerald-300 inline-block"></span>已签到
      </div>
      <div class="flex items-center gap-1.5 text-xs text-slate-500">
        <span class="w-3 h-3 rounded bg-white border border-slate-200 inline-block"></span>空位
      </div>
      <div class="flex items-center gap-1.5 text-xs text-slate-500">
        <span class="w-3 h-3 rounded bg-slate-100 border border-dashed border-slate-200 inline-block"></span>无座位
      </div>
      <div class="flex items-center gap-1.5 text-xs text-slate-500">
        <span class="w-3 h-3 rounded bg-red-100 border border-red-300 inline-block"></span>重复 IP
      </div>
      <span class="text-xs text-slate-400 ml-auto">根据签到 IP 最后一段匹配座位编号</span>
    </div>

    <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-6 overflow-x-auto">
      <div id="podiumTop" class="hidden justify-center mb-6">
        <div class="podium">讲 &nbsp; 台 &nbsp; 区 &nbsp; 域</div>
      </div>
      <div id="seatGrid" class="flex flex-col gap-2 items-center"></div>
      <div id="podiumBottom" class="flex justify-center mt-6">
        <div class="podium">讲 &nbsp; 台 &nbsp; 区 &nbsp; 域</div>
      </div>
    </div>

  </main>

<script>
function fmtHomeClass(hc) {
  if (!hc) return ''
  return hc.endsWith('班') ? hc : hc + '班'
}

const TEACHER_GRID = {{ teacherGridJson | safe }}
const STUDENT_GRID = {{ studentGridJson | safe }}
const TEACHER_AISLES = new Set([1, 3, 5])
const STUDENT_AISLES = new Set([1, 3, 5])

let currentView = 'teacher'

function renderGrid(grid, aisles) {
  const container = document.getElementById('seatGrid')
  container.innerHTML = ''
  grid.forEach(row => {
    const rowDiv = document.createElement('div')
    rowDiv.className = 'flex gap-1.5 items-center'
    row.forEach((seat, colIdx) => {
      const card = document.createElement('div')
      card.className = 'seat-card'
      if (seat.seatNo === null) {
        card.classList.add('empty-slot')
      } else if (seat.dupIp) {
        card.classList.add('dup')
      } else if (seat.students.length > 0) {
        card.classList.add('signed')
      }
      if (seat.seatNo !== null) {
        const noEl = document.createElement('div')
        noEl.className = 'seat-no'
        noEl.textContent = `#${seat.label}`
        card.appendChild(noEl)
        if (seat.students.length > 0) {
          if (seat.dupIp) {
            const nameEl = document.createElement('div')
            nameEl.className = 'stu-name'
            nameEl.textContent = seat.students.map(s => s.name).join(' / ')
            card.appendChild(nameEl)
          } else {
            const stu = seat.students[0]
            const nameEl = document.createElement('div')
            nameEl.className = 'stu-name'
            nameEl.textContent = stu.name
            card.appendChild(nameEl)
            const hcEl = document.createElement('div')
            hcEl.className = 'home-class'
            hcEl.textContent = fmtHomeClass(stu.homeClass)
            card.appendChild(hcEl)
          }
        }
      }
      rowDiv.appendChild(card)
      if (aisles.has(colIdx)) {
        const aisle = document.createElement('div')
        aisle.className = 'aisle'
        rowDiv.appendChild(aisle)
      }
    })
    container.appendChild(rowDiv)
  })
}

function setView(view) {
  currentView = view
  const isTeacher = view === 'teacher'
  document.getElementById('btnTeacher').className =
    `px-3 py-1.5 transition text-sm ${isTeacher ? 'bg-slate-800 text-white' : 'text-slate-600 hover:bg-slate-50'}`
  document.getElementById('btnStudent').className =
    `px-3 py-1.5 transition text-sm ${!isTeacher ? 'bg-slate-800 text-white' : 'text-slate-600 hover:bg-slate-50'}`
  document.getElementById('podiumTop').classList.toggle('hidden', isTeacher)
  document.getElementById('podiumTop').classList.toggle('flex', !isTeacher)
  document.getElementById('podiumBottom').classList.toggle('hidden', !isTeacher)
  document.getElementById('podiumBottom').classList.toggle('flex', isTeacher)
  renderGrid(isTeacher ? TEACHER_GRID : STUDENT_GRID, isTeacher ? TEACHER_AISLES : STUDENT_AISLES)
}

document.getElementById('btnTeacher').addEventListener('click', () => setView('teacher'))
document.getElementById('btnStudent').addEventListener('click', () => setView('student'))
setView('teacher')

// 5秒轮询自动刷新
const CLASS_ID = {{ classId }}
let paused = false

function formatTime(date) {
  const pad = n => String(n).padStart(2, '0')
  return pad(date.getHours()) + ':' + pad(date.getMinutes()) + ':' + pad(date.getSeconds())
}

async function pollSeatGrid() {
  if (paused) return
  try {
    const res = await fetch('/api/seat-grid?classId=' + CLASS_ID)
    if (res.status === 401) { window.location.href = '/student'; return }
    if (!res.ok) throw new Error('HTTP ' + res.status)
    const data = await res.json()
    const badge = document.querySelector('header .bg-emerald-50')
    if (badge) badge.textContent = '已签到 ' + data.signedCount + ' 人'
    renderGrid(currentView === 'teacher' ? data.teacherGrid : data.studentGrid,
               currentView === 'teacher' ? TEACHER_AISLES : STUDENT_AISLES)
    document.getElementById('refreshStatus').textContent = '上次刷新 ' + formatTime(new Date())
  } catch (e) {
    document.getElementById('refreshStatus').textContent = '刷新失败，请检查网络'
  }
}

document.getElementById('pauseBtn').addEventListener('click', () => {
  paused = !paused
  document.getElementById('pauseBtn').textContent = paused ? '恢复刷新' : '暂停刷新'
  if (paused) document.getElementById('refreshStatus').textContent = '已暂停'
})

setInterval(pollSeatGrid, 5000)
</script>
</body>
</html>
