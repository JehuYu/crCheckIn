<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>小题成绩处理 - 机房签到</title>
  <link rel="stylesheet" href="/public/tailwind.min.css">
  <link rel="stylesheet" href="/public/admin.css">
  <style>
    :root {
      --canvas: #faf9f5;
      --surface-card: #efe9de;
      --surface-dark: #181715;
      --primary: #cc785c;
      --primary-active: #a9583e;
      --ink: #141413;
      --body: #3d3d3a;
      --muted: #6c6a64;
      --muted-soft: #8e8b82;
      --hairline: #e6dfd8;
      --success: #5db872;
      --error: #c64545;
      --warning: #d4a017;
      --info: #4a90d9;
    }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: var(--canvas);
      color: var(--body);
      margin: 0;
    }
    .hidden { display: none !important; }
    .header-bar {
      background: var(--canvas);
      border-bottom: 1px solid var(--hairline);
      height: 64px;
      position: sticky;
      top: 0;
      z-index: 20;
    }
    .header-inner {
      max-width: 1300px;
      height: 100%;
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .header-left,
    .header-right {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }
    .nav-link,
    .nav-action {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border-radius: 8px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 500;
      transition: all .15s ease;
      text-decoration: none;
      border: none;
      background: none;
      cursor: pointer;
      white-space: nowrap;
    }
    .nav-link:hover,
    .nav-action:hover { background: var(--surface-card); color: var(--ink); }
    .page-title {
      font-family: Georgia, 'Times New Roman', serif;
      font-weight: 400;
      color: var(--ink);
      letter-spacing: 0;
    }
    .main {
      max-width: 1300px;
      margin: 0 auto;
      padding: 18px 24px 48px;
    }
    .hero {
      background: #fff;
      color: var(--ink);
      border: 1px solid var(--hairline);
      border-radius: 8px;
      padding: 18px 20px;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      box-shadow: 0 10px 30px rgba(25, 23, 20, .04);
    }
    .hero h1 {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 22px;
      font-weight: 400;
      margin: 0;
      letter-spacing: 0;
    }
    .hero p {
      color: var(--muted);
      font-size: 13px;
      margin: 6px 0 0;
    }
    .tool-grid {
      display: grid;
      grid-template-columns: minmax(300px, 342px) minmax(0, 1fr);
      gap: 18px;
      align-items: start;
    }
    .panel {
      background: #fff;
      border: 1px solid var(--hairline);
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(25, 23, 20, .035);
    }
    .panel-head {
      min-height: 58px;
      padding: 14px 18px;
      border-bottom: 1px solid var(--hairline);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .panel-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--ink);
      margin: 0;
    }
    .panel-body { padding: 16px; }
    .result-panel {
      min-width: 0;
    }
    .result-body {
      min-height: 376px;
    }
    .upload-zone {
      border: 1px dashed #d9cec4;
      border-radius: 8px;
      min-height: 94px;
      padding: 14px;
      text-align: left;
      background: #fcfbf8;
      transition: border-color .15s, background .15s;
      cursor: pointer;
      display: grid;
      grid-template-columns: 44px minmax(0, 1fr);
      align-items: center;
      column-gap: 12px;
    }
    .upload-zone:hover,
    .upload-zone.dragging {
      border-color: var(--primary);
      background: #fef3ec;
    }
    .upload-zone.compact {
      min-height: 78px;
      padding: 12px 14px;
      margin-top: 10px;
    }
    .upload-zone.compact .upload-icon {
      width: 38px;
      height: 38px;
    }
    .upload-icon {
      width: 44px;
      height: 44px;
      border-radius: 8px;
      grid-row: 1 / span 2;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fef3ec;
      color: var(--primary);
    }
    .upload-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--ink);
      margin: 0 0 3px;
      grid-column: 2;
    }
    .upload-name {
      font-size: 12px;
      color: var(--muted-soft);
      margin: 0;
      word-break: break-all;
      grid-column: 2;
      line-height: 1.45;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 9px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      border: none;
      cursor: pointer;
      transition: all .15s;
      text-decoration: none;
      white-space: nowrap;
      height: 40px;
    }
    .btn:disabled {
      opacity: .55;
      cursor: default;
    }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover:not(:disabled) { background: var(--primary-active); }
    .btn-secondary {
      background: var(--canvas);
      color: var(--ink);
      border: 1px solid var(--hairline);
    }
    .btn-secondary:hover { background: var(--surface-card); }
    .action-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      margin-top: 12px;
    }
    .status {
      margin-top: 12px;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 13px;
      line-height: 1.5;
      border: 1px solid transparent;
    }
    .status.ok { color: #047857; background: #f0fdf4; border-color: #b7e4c7; }
    .status.err { color: var(--error); background: #fef2f2; border-color: #f5c6cb; }
    .status.info { color: var(--muted); background: var(--canvas); border-color: var(--hairline); }
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(120px, 1fr));
      gap: 10px;
    }
    .kpi {
      border: 1px solid var(--hairline);
      border-radius: 8px;
      background: #fff;
      padding: 14px 12px;
    }
    .kpi-value {
      font-family: Georgia, serif;
      font-size: 26px;
      line-height: 1;
      color: var(--ink);
    }
    .kpi-label {
      margin-top: 6px;
      font-size: 11px;
      color: var(--muted-soft);
    }
    .advice-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-top: 12px;
    }
    .advice-box {
      border: 1px solid var(--hairline);
      border-radius: 8px;
      background: #fcfbf8;
      padding: 12px;
      min-width: 0;
    }
    .advice-heading {
      margin: 0;
      font-size: 12px;
      font-weight: 600;
      color: var(--ink);
    }
    .advice-list {
      display: flex;
      flex-direction: column;
      gap: 7px;
      margin-top: 10px;
    }
    .advice-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      min-width: 0;
      font-size: 12px;
      color: var(--body);
    }
    .advice-row span:first-child {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .advice-score {
      flex: 0 0 auto;
      color: var(--ink);
      font-weight: 600;
    }
    .advice-note {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }
    .advice-empty {
      margin-top: 10px;
      color: var(--muted-soft);
      font-size: 12px;
    }
    .tabs {
      display: flex;
      gap: 4px;
      padding: 4px;
      border-radius: 8px;
      background: var(--canvas);
      width: fit-content;
      margin: 14px 0 12px;
    }
    .tab {
      border: none;
      background: transparent;
      color: var(--muted);
      border-radius: 6px;
      padding: 7px 12px;
      font-size: 13px;
      cursor: pointer;
    }
    .tab.active {
      background: #fff;
      color: var(--ink);
      box-shadow: 0 1px 2px rgba(0,0,0,.05);
    }
    .table-wrap {
      overflow-x: auto;
      border: 1px solid var(--hairline);
      border-radius: 8px;
      background: #fff;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
      min-width: 720px;
    }
    th, td {
      padding: 9px 10px;
      border-bottom: 1px solid var(--hairline);
      text-align: center;
      white-space: nowrap;
    }
    th {
      background: var(--canvas);
      color: var(--muted);
      font-weight: 600;
    }
    td:first-child,
    th:first-child {
      text-align: left;
      color: var(--ink);
      font-weight: 600;
      position: sticky;
      left: 0;
      background: inherit;
    }
    tbody tr:nth-child(even) { background: #fcfbf8; }
    tbody tr:hover { background: #fef3ec; }
    .empty {
      padding: 42px 24px;
      text-align: center;
      color: var(--muted-soft);
      font-size: 13px;
    }
    .result-empty {
      min-height: 286px;
      border: 1px dashed var(--hairline);
      border-radius: 8px;
      background:
        linear-gradient(180deg, rgba(250,249,245,.9), rgba(255,255,255,.96)),
        #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 10px;
    }
    .result-empty::before {
      content: "";
      width: 42px;
      height: 42px;
      border-radius: 8px;
      background:
        linear-gradient(90deg, transparent 12px, rgba(74,144,217,.16) 12px 14px, transparent 14px),
        linear-gradient(180deg, rgba(204,120,92,.16), rgba(74,144,217,.12));
      border: 1px solid #dcd7d0;
      box-shadow: inset 0 -10px 20px rgba(255,255,255,.45);
    }
    .warning-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 12px;
    }
    .warning-item {
      padding: 9px 10px;
      border-radius: 8px;
      background: #fffbeb;
      color: #a16207;
      border: 1px solid #fde68a;
      font-size: 12px;
      line-height: 1.5;
    }
    @media (max-width: 920px) {
      .tool-grid { grid-template-columns: 1fr; }
      .kpi-grid { grid-template-columns: repeat(2, 1fr); }
      .advice-grid { grid-template-columns: 1fr; }
      .hero { align-items: flex-start; flex-direction: column; }
      .result-body { min-height: 300px; }
    }
    @media (max-width: 560px) {
      .header-inner { padding: 0 12px; }
      .main { padding: 16px 12px 36px; }
      .kpi-grid { grid-template-columns: 1fr; }
      .hero { padding: 16px; }
      .hero h1 { font-size: 18px; }
      .panel-body { padding: 14px; }
      .upload-zone {
        grid-template-columns: 38px minmax(0, 1fr);
        min-height: 86px;
        padding: 12px;
      }
      .upload-icon {
        width: 38px;
        height: 38px;
      }
      .action-row { grid-template-columns: 1fr; }
      .result-empty { min-height: 220px; }
    }
  </style>
</head>
<body>
  <header class="header-bar">
    <div class="header-inner">
      <div class="header-left">
        <a href="/teacher/classes" class="nav-link">
          <svg style="width:16px;height:16px;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
          </svg>
          返回
        </a>
        <span style="color: var(--hairline);">|</span>
        <span class="page-title text-lg">小题成绩处理</span>
      </div>
      <div class="header-right">
        <span style="font-size:13px;color:var(--muted-soft);">{{ teacher.username }}</span>
        <form method="post" action="/teacher/logout" style="display:inline;">
          <button class="nav-action" type="submit">退出</button>
        </form>
      </div>
    </div>
  </header>

  <main class="main">
    <div class="hero">
      <div>
        <h1>小题成绩处理</h1>
        <p>上传原始小题分 Excel，生成班级均分、信息/通用小题分析和明细工作簿。</p>
      </div>
      <a id="downloadBtn" href="#" class="btn btn-secondary hidden">
        <svg style="width:16px;height:16px;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
        </svg>
        下载结果
      </a>
    </div>

    <div class="tool-grid">
      <section class="panel">
        <div class="panel-head">
          <p class="panel-title">小题分原始成绩文件</p>
          <span style="font-size:11px;color:var(--muted-soft);">.xls / .xlsx</span>
        </div>
        <div class="panel-body">
          <label class="upload-zone" id="uploadZone" for="examFile">
            <span class="upload-icon">
              <svg style="width:22px;height:22px;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/>
              </svg>
            </span>
            <p class="upload-title">选择原始成绩表</p>
            <p class="upload-name" id="fileName">未选择文件</p>
            <input id="examFile" type="file" accept=".xls,.xlsx" class="hidden">
          </label>
          <label class="upload-zone compact" for="classMappingFile">
            <span class="upload-icon">
              <svg style="width:18px;height:18px;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4V7M5 5h14v14H5z"/>
              </svg>
            </span>
            <p class="upload-title">分班表（可选）</p>
            <p class="upload-name" id="mappingName">未选择，使用默认分班表</p>
            <input id="classMappingFile" type="file" accept=".xls,.xlsx" class="hidden">
          </label>
          <div class="action-row">
            <button id="analyzeBtn" class="btn btn-primary" disabled>开始处理</button>
            <button id="clearBtn" class="btn btn-secondary" type="button">清空</button>
          </div>
          <div id="statusBox" class="status info hidden"></div>
          <div id="warningsBox" class="warning-list hidden"></div>
        </div>
      </section>

      <section class="panel result-panel">
        <div class="panel-head">
          <p class="panel-title">处理结果</p>
          <span id="resultBadge" style="font-size:11px;color:var(--muted-soft);"></span>
        </div>
        <div class="panel-body result-body">
          <div id="emptyState" class="empty result-empty">暂无结果</div>
          <div id="resultView" class="hidden">
            <div class="kpi-grid" id="kpiGrid"></div>
            <div class="advice-grid hidden" id="adviceGrid"></div>
            <div class="tabs" id="tabs">
              <button class="tab active" data-tab="class_averages">班级均分</button>
              <button class="tab" data-tab="info_analysis">信息小题</button>
              <button class="tab" data-tab="general_analysis">通用小题</button>
            </div>
            <div class="table-wrap" id="tableWrap"></div>
          </div>
        </div>
      </section>
    </div>
  </main>

<script>
const fileInput = document.getElementById('examFile')
const mappingInput = document.getElementById('classMappingFile')
const fileName = document.getElementById('fileName')
const mappingName = document.getElementById('mappingName')
const analyzeBtn = document.getElementById('analyzeBtn')
const clearBtn = document.getElementById('clearBtn')
const statusBox = document.getElementById('statusBox')
const warningsBox = document.getElementById('warningsBox')
const resultView = document.getElementById('resultView')
const emptyState = document.getElementById('emptyState')
const resultBadge = document.getElementById('resultBadge')
const kpiGrid = document.getElementById('kpiGrid')
const adviceGrid = document.getElementById('adviceGrid')
const tableWrap = document.getElementById('tableWrap')
const downloadBtn = document.getElementById('downloadBtn')
const uploadZone = document.getElementById('uploadZone')
let currentResult = null
let activeTab = 'class_averages'

function setStatus(text, type = 'info') {
  statusBox.textContent = text
  statusBox.className = `status ${type}`
}

function clearStatus() {
  statusBox.textContent = ''
  statusBox.className = 'status info hidden'
}

function escHtml(value) {
  return String(value ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;')
}

function setFile(file) {
  if (!file) {
    fileName.textContent = '未选择文件'
    analyzeBtn.disabled = true
    clearStatus()
    return
  }
  fileName.textContent = file.name
  const name = file.name || ''
  const isExcel = /\.(xls|xlsx)$/i.test(name)
  analyzeBtn.disabled = !isExcel
  if (!isExcel) {
    setStatus('请上传 .xls 或 .xlsx 文件', 'err')
    return
  }
  if (/(分班|汇总表)/.test(name) && !/小题分/.test(name)) {
    setStatus('这个文件名像分班表或汇总表，请确认选择的是原始小题分成绩文件。')
    return
  }
  clearStatus()
}

function setMappingFile(file) {
  if (!file) {
    mappingName.textContent = '未选择，使用默认分班表'
    return
  }
  mappingName.textContent = file.name
  if (!/\.(xls|xlsx)$/i.test(file.name || '')) {
    setStatus('分班表请上传 .xls 或 .xlsx 文件', 'err')
    mappingInput.value = ''
    mappingName.textContent = '未选择，使用默认分班表'
  }
}

function resetPage() {
  fileInput.value = ''
  mappingInput.value = ''
  setFile(null)
  setMappingFile(null)
  currentResult = null
  activeTab = 'class_averages'
  resultView.classList.add('hidden')
  emptyState.classList.remove('hidden')
  downloadBtn.classList.add('hidden')
  resultBadge.textContent = ''
  warningsBox.innerHTML = ''
  warningsBox.classList.add('hidden')
  adviceGrid.innerHTML = ''
  adviceGrid.classList.add('hidden')
  clearStatus()
}

function renderWarnings(warnings) {
  if (!warnings || warnings.length === 0) {
    warningsBox.innerHTML = ''
    warningsBox.classList.add('hidden')
    return
  }
  warningsBox.innerHTML = warnings.map(w => `<div class="warning-item">${escHtml(w)}</div>`).join('')
  warningsBox.classList.remove('hidden')
}

function renderKpis(summary) {
  const rows = [
    ['小题数', summary.question_count ?? 0],
    ['信息题', summary.info_question_count ?? 0],
    ['通用题', summary.general_question_count ?? 0],
    ['未分类', summary.unclassified_question_count ?? 0],
  ]
  kpiGrid.innerHTML = rows.map(([label, value]) => `
    <div class="kpi">
      <div class="kpi-value">${escHtml(value)}</div>
      <div class="kpi-label">${escHtml(label)}</div>
    </div>
  `).join('')
}

function formatScore(value) {
  const number = Number(value)
  if (!Number.isFinite(number)) return '-'
  return String(Number(number.toFixed(2)))
}

function renderAdviceList(items, renderItem) {
  if (!items.length) return '<div class="advice-empty">暂无</div>'
  return `<div class="advice-list">${items.map(renderItem).join('')}</div>`
}

function renderTeachingAdvice(advice) {
  const lowQuestions = Array.isArray(advice?.lowQuestions) ? advice.lowQuestions.slice(0, 5) : []
  const weakClasses = Array.isArray(advice?.weakClasses) ? advice.weakClasses : []
  const focus = advice?.subjectFocus || null

  if (!lowQuestions.length && !weakClasses.length && !focus) {
    adviceGrid.innerHTML = ''
    adviceGrid.classList.add('hidden')
    return
  }

  const focusNote = focus
    ? (Number(focus.gap) > 0 ? `比${escHtml(focus.comparedWith)}低 ${escHtml(formatScore(focus.gap))} 分` : '两科均分接近')
    : '暂无'

  adviceGrid.innerHTML = `
    <div class="advice-box">
      <p class="advice-heading">优先讲评小题</p>
      ${renderAdviceList(lowQuestions, item => `
        <div class="advice-row">
          <span>${escHtml(item.subject)} · ${escHtml(item.question)}</span>
          <strong class="advice-score">${escHtml(formatScore(item.average))}</strong>
        </div>
      `)}
    </div>
    <div class="advice-box">
      <p class="advice-heading">关注班级</p>
      ${renderAdviceList(weakClasses, item => `
        <div class="advice-row">
          <span>${escHtml(item.className)}班</span>
          <strong class="advice-score">全卷 ${escHtml(formatScore(item.fullScore))}</strong>
        </div>
      `)}
    </div>
    <div class="advice-box">
      <p class="advice-heading">学科侧重</p>
      ${focus ? `
        <div class="advice-list">
          <div class="advice-row">
            <span>${escHtml(focus.subject)}</span>
            <strong class="advice-score">${escHtml(formatScore(focus.score))}</strong>
          </div>
        </div>
        <p class="advice-note">${focusNote}</p>
      ` : '<div class="advice-empty">暂无</div>'}
    </div>
  `
  adviceGrid.classList.remove('hidden')
}

function renderTable(key) {
  const table = currentResult?.[key]
  if (!table || !Array.isArray(table.columns) || !Array.isArray(table.data) || table.data.length === 0) {
    tableWrap.innerHTML = '<div class="empty">暂无表格数据</div>'
    return
  }
  const thead = table.columns.map(col => `<th>${escHtml(col)}</th>`).join('')
  const rows = table.data.map(row => {
    const cells = table.columns.map(col => {
      const raw = row[col]
      const value = typeof raw === 'number' ? Number(raw.toFixed(2)) : (raw ?? '')
      return `<td>${escHtml(value)}</td>`
    }).join('')
    return `<tr>${cells}</tr>`
  }).join('')
  tableWrap.innerHTML = `<table><thead><tr>${thead}</tr></thead><tbody>${rows}</tbody></table>`
}

function renderResult(data) {
  currentResult = data
  emptyState.classList.add('hidden')
  resultView.classList.remove('hidden')
  resultBadge.textContent = '已完成'
  renderKpis(data.summary || {})
  renderTeachingAdvice(data.teachingAdvice)
  renderWarnings(data.warnings || [])
  renderTable(activeTab)
  if (data.downloadUrl) {
    downloadBtn.href = data.downloadUrl
    downloadBtn.classList.remove('hidden')
  }
}

fileInput.addEventListener('change', () => setFile(fileInput.files[0]))
mappingInput.addEventListener('change', () => setMappingFile(mappingInput.files[0]))
clearBtn.addEventListener('click', resetPage)

uploadZone.addEventListener('dragover', (event) => {
  event.preventDefault()
  uploadZone.classList.add('dragging')
})
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragging'))
uploadZone.addEventListener('drop', (event) => {
  event.preventDefault()
  uploadZone.classList.remove('dragging')
  const file = event.dataTransfer.files[0]
  if (!file) return
  const transfer = new DataTransfer()
  transfer.items.add(file)
  fileInput.files = transfer.files
  setFile(file)
})

document.getElementById('tabs').addEventListener('click', (event) => {
  const tab = event.target.closest('.tab')
  if (!tab) return
  activeTab = tab.dataset.tab
  document.querySelectorAll('.tab').forEach(btn => btn.classList.toggle('active', btn === tab))
  renderTable(activeTab)
})

analyzeBtn.addEventListener('click', async () => {
  const file = fileInput.files[0]
  if (!file) return
  analyzeBtn.disabled = true
  setStatus('处理中...')
  const body = new FormData()
  body.append('file', file)
  if (mappingInput.files[0]) {
    body.append('classMapping', mappingInput.files[0])
  }
  try {
    const res = await fetch('/api/exam-analysis', { method: 'POST', body })
    if (res.status === 401) {
      window.location.href = '/student'
      return
    }
    const data = await res.json()
    if (!data.ok) {
      setStatus(data.message || '处理失败', 'err')
      return
    }
    setStatus('处理完成', 'ok')
    renderResult(data)
  } catch (error) {
    setStatus(error.message || '处理失败', 'err')
  } finally {
    analyzeBtn.disabled = false
  }
})
</script>
</body>
</html>
