<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>教师登录</title>
  <link rel="stylesheet" href="/public/tailwind.min.css">
  <style>body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }</style>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-50 to-slate-100 flex items-center justify-center p-4">
  <div class="w-full max-w-sm">

    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-slate-800 mb-4 shadow-lg">
        <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
        </svg>
      </div>
      <h1 class="text-2xl font-semibold text-slate-800">教师端登录</h1>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6">

      <form id="loginForm">
        <div class="mb-4">
          <label class="block text-sm font-medium text-slate-600 mb-1.5">用户名</label>
          <input type="text" id="username" name="username" required autofocus autocomplete="username"
            class="w-full px-4 py-2.5 rounded-xl border border-slate-200 text-slate-800
                   focus:outline-none focus:ring-2 focus:ring-slate-800 focus:border-transparent transition" />
        </div>
        <div class="mb-4">
          <label class="block text-sm font-medium text-slate-600 mb-1.5">密码</label>
          <input type="password" id="password" name="password" required autocomplete="current-password"
            class="w-full px-4 py-2.5 rounded-xl border border-slate-200 text-slate-800
                   focus:outline-none focus:ring-2 focus:ring-slate-800 focus:border-transparent transition" />
        </div>
        <div id="loginErr" class="hidden mb-4 px-4 py-3 rounded-xl bg-red-50 border border-red-100 text-sm text-red-600"></div>
        <button type="submit"
          class="w-full py-2.5 bg-slate-800 hover:bg-slate-900 text-white font-medium rounded-xl transition">
          登录
        </button>
      </form>
      <script>
        document.getElementById('loginForm').addEventListener('submit', async e => {
          e.preventDefault()
          const btn = e.target.querySelector('button[type=submit]')
          btn.disabled = true
          const res = await fetch('/api/teacher-login-form', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              username: document.getElementById('username').value,
              password: document.getElementById('password').value
            })
          })
          const data = await res.json()
          if (data.ok) {
            window.location.href = data.redirect
          } else {
            const err = document.getElementById('loginErr')
            err.textContent = data.message || '用户名或密码错误，请重试。'
            err.classList.remove('hidden')
            btn.disabled = false
          }
        })
      <\/script>
    </div>

  </div>
</body>
</html>
