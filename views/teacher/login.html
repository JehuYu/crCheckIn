<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>싱可되쩌</title>
  <link rel="stylesheet" href="/public/tailwind.min.css">
  <style>body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }</style>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-50 to-slate-100 flex items-center justify-center p-4">
  <div class="w-full max-w-sm">

    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-slate-800 mb-4 shadow-lg">
        <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
        </svg>
      </div>
      <h1 class="text-2xl font-semibold text-slate-800">싱可똥되쩌</h1>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6">
      {% if error %}
      <div class="mb-4 px-4 py-3 rounded-xl bg-red-50 border border-red-100 text-sm text-red-600">{{ error }}</div>
      {% endif %}

      <form method="post" action="/teacher/login">
        <div class="mb-4">
          <label class="block text-sm font-medium text-slate-600 mb-1.5">痰빵츰</label>
          <input type="text" name="username" required autofocus autocomplete="username"
            class="w-full px-4 py-2.5 rounded-xl border border-slate-200 text-slate-800
                   focus:outline-none focus:ring-2 focus:ring-slate-800 focus:border-transparent transition" />
        </div>
        <div class="mb-4">
          <label class="block text-sm font-medium text-slate-600 mb-1.5">쵱쯤</label>
          <input type="password" name="password" required autocomplete="current-password"
            class="w-full px-4 py-2.5 rounded-xl border border-slate-200 text-slate-800
                   focus:outline-none focus:ring-2 focus:ring-slate-800 focus:border-transparent transition" />
        </div>
        <button type="submit"
          class="w-full py-2.5 bg-slate-800 hover:bg-slate-900 text-white font-medium rounded-xl transition">
          되쩌
        </button>
      </form>
    </div>

  </div>
</body>
</html>
