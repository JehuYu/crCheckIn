<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ cls.name }} - 学生管理</title>
  <link rel="stylesheet" href="/public/tailwind.min.css">
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; }
    .fade { animation: fadeIn .15s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: none; } }
    .card { background:#fff; border-radius:16px; border:1px solid #f1f5f9; }
  </style>
</head>
<body class="min-h-screen bg-slate-50">

  <header class="bg-white border-b border-slate-100 sticky top-0 z-20">
    <div class="max-w-3xl mx-auto px-4 h-14 flex items-center gap-3">
      <a href="/teacher/classes/{{ cls.id }}"
        class="text-sm text-slate-400 hover:text-slate-600 transition flex items-center gap-1">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
        </svg>
        返回
      </a>
      <span class="text-slate-200">|</span>
      <span class="font-semibold text-slate-800">{{ cls.name }}</span>
      <span class="text-xs bg-slate-100 text-slate-500 rounded-full px-2 py-0.5">学生管理</span>
    </div>
  </header>

  <main class="max-w-3xl mx-auto px-4 py-6">

    <div id="msg" class="hidden mb-4 px-4 py-3 rounded-xl text-sm font-medium fade"></div>

    <div class="card overflow-hidden">
      <div class="px-5 py-4 border-b border-slate-50 flex items-center justify-between">
        <p class="text-sm font-medium text-slate-700">共 <span id="stuCount">{{ students | length }}</span> 名学生</p>
      </div>
      <ul id="stuList">
        {% for s in students %}
        <li id="row-{{ s.id }}" class="flex items-center gap-3 px-5 py-3 border-b border-slate-50 last:border-0 hover:bg-slate-50 transition"
          data-id="{{ s.id }}" data-name="{{ s.name }}" data-homeclass="{{ s.homeClass }}">
          <!-- 查看态 -->
          <div class="view-mode flex-1 flex items-center gap-3 min-w-0">
            <div class="flex-1 min-w-0">
              <p class="text-sm font-medium text-slate-800 name-cell truncate">{{ s.name }}</p>
              <p class="text-xs text-slate-400 hc-cell truncate">{{ s.homeClass }}</p>
            </div>
            <div class="flex items-center gap-1 flex-shrink-0">
              <button onclick="startEdit({{ s.id }})"
                class="text-xs px-2.5 py-1 rounded-lg text-slate-500 hover:bg-slate-100 transition">编辑</button>
              <button onclick="startTransfer({{ s.id }}, '{{ s.name }}')"
                class="text-xs px-2.5 py-1 rounded-lg text-indigo-500 hover:bg-indigo-50 transition">转移</button>
              <button onclick="confirmDelete({{ s.id }}, '{{ s.name }}')"
                class="text-xs px-2.5 py-1 rounded-lg text-red-400 hover:bg-red-50 transition">删除</button>
            </div>
          </div>
          <!-- 编辑态 -->
          <div class="edit-mode hidden flex-1 flex items-center gap-2 min-w-0">
            <input id="edit-name-{{ s.id }}" type="text" value="{{ s.name }}"
              class="px-2 py-1.5 rounded-lg border border-slate-200 text-sm w-28 focus:outline-none focus:ring-2 focus:ring-slate-400" />
            <input id="edit-hc-{{ s.id }}" type="text" value="{{ s.homeClass }}"
              class="px-2 py-1.5 rounded-lg border border-slate-200 text-sm w-24 focus:outline-none focus:ring-2 focus:ring-slate-400" placeholder="行政班级" />
            <button onclick="saveEdit({{ s.id }})"
              class="text-xs px-3 py-1.5 rounded-lg bg-slate-800 text-white hover:bg-slate-900 transition flex-shrink-0">保存</button>
            <button onclick="cancelEdit({{ s.id }})"
              class="text-xs px-2.5 py-1.5 rounded-lg text-slate-500 hover:bg-slate-100 transition flex-shrink-0">取消</button>
          </div>
        </li>
        {% endfor %}
      </ul>
    </div>

  </main>

  <!-- 转移弹窗 -->
  <div id="transferModal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/30">
    <div class="bg-white rounded-2xl shadow-xl w-72 mx-4 p-6">
      <p class="text-sm font-semibold text-slate-800 mb-1">转移学生</p>
      <p id="transferName" class="text-xs text-slate-400 mb-4"></p>
      <label class="block text-xs text-slate-500 mb-1">目标教学班</label>
      <select id="transferTarget"
        class="w-full px-3 py-2 rounded-lg border border-slate-200 text-sm focus:outline-none focus:ring-2 focus:ring-slate-400 mb-4">
        {% for c in classes %}
        <option value="{{ c.id }}">{{ c.name }}</option>
        {% endfor %}
      </select>
      <div class="flex gap-2 justify-end">
        <button onclick="closeTransfer()"
          class="px-4 py-2 text-sm text-slate-600 hover:bg-slate-100 rounded-lg transition">取消</button>
        <button onclick="doTransfer()"
          class="px-4 py-2 text-sm bg-slate-800 hover:bg-slate-900 text-white rounded-lg transition">确认转移</button>
      </div>
    </div>
  </div>

<script>
const msg = document.getElementById('msg')
let transferStudentId = null

function notify(text, ok = true) {
  msg.className = `mb-4 px-4 py-3 rounded-xl text-sm font-medium fade ${ok
    ? 'bg-emerald-50 text-emerald-700 border border-emerald-100'
    : 'bg-red-50 text-red-600 border border-red-100'}`
  msg.textContent = text
  msg.classList.remove('hidden')
  setTimeout(() => msg.classList.add('hidden'), 3000)
}

function startEdit(id) {
  const row = document.getElementById(`row-${id}`)
  row.querySelector('.view-mode').classList.add('hidden')
  row.querySelector('.edit-mode').classList.remove('hidden')
  row.querySelector('.edit-mode').classList.add('flex')
}

function cancelEdit(id) {
  const row = document.getElementById(`row-${id}`)
  row.querySelector('.view-mode').classList.remove('hidden')
  row.querySelector('.edit-mode').classList.add('hidden')
  row.querySelector('.edit-mode').classList.remove('flex')
}

async function saveEdit(id) {
  const name = document.getElementById(`edit-name-${id}`).value.trim()
  const homeClass = document.getElementById(`edit-hc-${id}`).value.trim()
  if (!name) { notify('姓名不能为空', false); return }
  const res = await fetch(`/api/students/${id}`, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name, homeClass }),
  })
  if (res.status === 401) { window.location.href = '/student'; return }
  const data = await res.json()
  if (!data.ok) { notify(data.message, false); return }
  const row = document.getElementById(`row-${id}`)
  row.querySelector('.name-cell').textContent = data.student.name
  row.querySelector('.hc-cell').textContent = data.student.homeClass || ''
  cancelEdit(id)
  notify('已更新')
}

async function confirmDelete(id, name) {
  if (!confirm(`确认删除学生「${name}」？`)) return
  const res = await fetch(`/api/students/${id}`, { method: 'DELETE' })
  if (res.status === 401) { window.location.href = '/student'; return }
  const data = await res.json()
  if (!data.ok) { notify(data.message, false); return }
  document.getElementById(`row-${id}`).remove()
  const cnt = document.getElementById('stuCount')
  cnt.textContent = parseInt(cnt.textContent) - 1
  notify('已删除')
}

function startTransfer(id, name) {
  transferStudentId = id
  document.getElementById('transferName').textContent = `学生：${name}`
  document.getElementById('transferModal').classList.remove('hidden')
}

function closeTransfer() {
  transferStudentId = null
  document.getElementById('transferModal').classList.add('hidden')
}

async function doTransfer() {
  const targetClassId = document.getElementById('transferTarget').value
  const res = await fetch(`/api/students/${transferStudentId}/transfer`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ targetClassId: parseInt(targetClassId) }),
  })
  if (res.status === 401) { window.location.href = '/student'; return }
  const data = await res.json()
  closeTransfer()
  if (!data.ok) { notify(data.message, false); return }
  document.getElementById(`row-${transferStudentId}`).remove()
  const cnt = document.getElementById('stuCount')
  cnt.textContent = parseInt(cnt.textContent) - 1
  notify('已转移')
}
</script>
</body>
</html>
