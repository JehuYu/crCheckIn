<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ cls.name }} - 学生管理</title>
  <link rel="stylesheet" href="/public/tailwind.min.css">
  <style>
    :root {
      --page-bg:#f6f8fc;
      --card-bg:rgba(255,255,255,.78);
      --card-border:rgba(15,23,42,.08);
      --card-shadow:0 20px 52px rgba(15,23,42,.08);
      --soft-shadow:0 10px 24px rgba(15,23,42,.05);
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background:
        radial-gradient(circle at top left, rgba(99,102,241,.10), transparent 26%),
        radial-gradient(circle at top right, rgba(56,189,248,.10), transparent 24%),
        linear-gradient(180deg, #fbfcfe 0%, var(--page-bg) 100%);
    }
    .fade { animation: fadeIn .15s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: none; } }
    .header-blur { background:rgba(255,255,255,.82); backdrop-filter:blur(18px); }
    .topbar-shell { min-height:84px; padding:16px 0; }
    .nav-link {
      display:inline-flex;align-items:center;gap:8px;padding:10px 12px;border-radius:12px;
      color:#475569;font-size:14px;font-weight:500;transition:all .15s ease;
    }
    .nav-link:hover { background:rgba(255,255,255,.7); color:#0f172a; }
    .nav-title { color:#0f172a;font-size:17px;font-weight:700;letter-spacing:.01em; }
    .chip {
      display:inline-flex;align-items:center;padding:6px 10px;border-radius:9999px;
      font-size:12px;font-weight:600;border:1px solid rgba(148,163,184,.18);background:rgba(248,250,252,.92);color:#475569;
    }
    .card {
      background:var(--card-bg); border-radius:20px; border:1px solid var(--card-border);
      box-shadow:var(--card-shadow); backdrop-filter:blur(14px);
    }
    .btn {
      display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:12px;font-size:13px;font-weight:500;
      transition:all .15s;cursor:pointer;text-decoration:none;box-shadow:var(--soft-shadow);border:none;
    }
    .btn-primary { background:linear-gradient(135deg,#6366f1,#5b6ee8); color:#fff; }
    .btn-gray { background:rgba(255,255,255,.82); color:#334155; border:1px solid rgba(148,163,184,.18); }
    .btn-danger { color:#dc2626; border:1px solid rgba(248,113,113,.24); background:rgba(255,255,255,.82); }
    .student-grid {
      display:grid;
      grid-template-columns:repeat(2, minmax(0, 1fr));
      gap:14px;
      padding:18px;
    }
    .student-item {
      border:1px solid rgba(226,232,240,.86);
      border-radius:18px;
      background:linear-gradient(180deg, rgba(255,255,255,.92), rgba(248,250,252,.82));
      box-shadow:var(--soft-shadow);
      padding:16px;
      transition:transform .15s ease, box-shadow .15s ease, border-color .15s ease;
    }
    .student-item:hover {
      transform:translateY(-1px);
      border-color:rgba(165,180,252,.35);
      box-shadow:0 14px 30px rgba(15,23,42,.08);
    }
    .student-head {
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
    }
    .student-title {
      min-width:0;
      display:flex;
      align-items:center;
      flex-wrap:wrap;
      gap:8px;
    }
    .student-name { font-size:15px; font-weight:600; color:#0f172a; }
    .student-homeclass {
      display:inline-flex;
      align-items:center;
      padding:4px 10px;
      border-radius:9999px;
      background:rgba(241,245,249,.96);
      border:1px solid rgba(226,232,240,.92);
      color:#475569;
      font-size:12px;
      font-weight:600;
      line-height:1;
    }
    .student-actions {
      display:flex;
      align-items:center;
      justify-content:flex-end;
      gap:6px;
      flex-wrap:wrap;
      flex-shrink:0;
    }
    .student-action {
      padding:6px 10px;
      border-radius:10px;
      font-size:12px;
      font-weight:600;
      line-height:1;
      transition:all .15s ease;
    }
    .student-action:hover { transform:translateY(-1px); }
    @media (max-width: 900px) {
      .student-grid { grid-template-columns:1fr; }
    }
    @media (max-width: 640px) {
      .student-head { flex-direction:column; }
      .student-actions { justify-content:flex-start; }
    }
  </style>
</head>
<body class="min-h-screen">

  <header class="header-blur border-b border-white/60 sticky top-0 z-20">
    <div class="max-w-5xl mx-auto px-4 topbar-shell flex items-center gap-3">
      <a href="/teacher/classes/{{ cls.id }}" class="nav-link">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
        </svg>
        返回
      </a>
      <span class="text-slate-300">|</span>
      <span class="nav-title">{{ cls.name }}</span>
      <span class="chip">学生管理</span>
    </div>
  </header>

  <main class="max-w-5xl mx-auto px-4 py-8">

    <div id="msg" class="hidden mb-4 px-4 py-3 rounded-xl text-sm font-medium fade"></div>

    <div class="card overflow-hidden">
      <div class="px-5 py-4 border-b border-slate-50 flex items-center justify-between">
        <p class="text-sm font-medium text-slate-700">共 <span id="stuCount">{{ students | length }}</span> 名学生</p>
      </div>
      <ul id="stuList" class="student-grid">
        {% for s in students %}
        <li id="row-{{ s.id }}" class="student-item"
          data-id="{{ s.id }}" data-name="{{ s.name }}" data-homeclass="{{ s.homeClass }}">
          <!-- 查看态 -->
          <div class="view-mode">
            <div class="student-head">
              <div class="min-w-0">
                <p class="student-title">
                  <span class="student-name name-cell truncate">{{ s.name }}</span>
                  <span class="student-homeclass hc-cell {% if s.homeClass %}{% else %}hidden{% endif %}">{{ s.homeClass }}</span>
                </p>
              </div>
              <div class="student-actions">
                <button onclick="openEdit({{ s.id }})"
                  class="student-action text-slate-500 hover:bg-slate-100">编辑</button>
                <button onclick="startTransfer({{ s.id }}, '{{ s.name }}')"
                  class="student-action text-indigo-600 hover:bg-indigo-50">转移</button>
                <button onclick="confirmDelete({{ s.id }}, '{{ s.name }}')"
                  class="student-action text-red-400 hover:bg-red-50">删除</button>
              </div>
            </div>
          </div>
        </li>
        {% endfor %}
      </ul>
    </div>

  </main>

  <div id="editModal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/30">
    <div class="card w-[26rem] max-w-[calc(100vw-2rem)] mx-4 p-6">
      <p class="text-sm font-semibold text-slate-800 mb-1">编辑学生</p>
      <p id="editStudentHint" class="text-xs text-slate-400 mb-4"></p>
      <div class="space-y-3">
        <div>
          <label for="editStudentName" class="block text-xs text-slate-500 mb-1">学生姓名</label>
          <input id="editStudentName" type="text"
            class="w-full px-3 py-2 rounded-xl border border-slate-200 text-sm min-w-0 focus:outline-none focus:ring-2 focus:ring-slate-400" />
        </div>
        <div>
          <label for="editStudentHomeClass" class="block text-xs text-slate-500 mb-1">行政班级</label>
          <input id="editStudentHomeClass" type="text"
            class="w-full px-3 py-2 rounded-xl border border-slate-200 text-sm min-w-0 focus:outline-none focus:ring-2 focus:ring-slate-400"
            placeholder="如：1 或 1班" />
        </div>
      </div>
      <div class="flex gap-2 justify-end mt-5">
        <button onclick="closeEdit()"
          class="px-4 py-2 text-sm text-slate-600 hover:bg-slate-100 rounded-lg transition">取消</button>
        <button onclick="saveEdit()"
          class="px-4 py-2 text-sm bg-indigo-500 hover:bg-indigo-600 text-white rounded-lg transition">保存</button>
      </div>
    </div>
  </div>

  <!-- 转移弹窗 -->
  <div id="transferModal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/30">
    <div class="card w-72 mx-4 p-6">
      <p class="text-sm font-semibold text-slate-800 mb-1">转移学生</p>
      <p id="transferName" class="text-xs text-slate-400 mb-4"></p>
      <label class="block text-xs text-slate-500 mb-1">目标教学班</label>
      <select id="transferTarget"
        class="w-full px-3 py-2 rounded-lg border border-slate-200 text-sm focus:outline-none focus:ring-2 focus:ring-slate-400 mb-4">
        {% for c in classes %}
        <option value="{{ c.id }}">{{ c.name }}</option>
        {% endfor %}
      </select>
      <div class="flex gap-2 justify-end">
        <button onclick="closeTransfer()"
          class="px-4 py-2 text-sm text-slate-600 hover:bg-slate-100 rounded-lg transition">取消</button>
        <button onclick="doTransfer()"
          class="px-4 py-2 text-sm bg-indigo-500 hover:bg-indigo-600 text-white rounded-lg transition">确认转移</button>
      </div>
    </div>
  </div>

<script>
const msg = document.getElementById('msg')
let editStudentId = null
let transferStudentId = null

function formatHomeClass(homeClass) {
  const value = (homeClass || '').trim()
  if (!value) return ''
  return value.endsWith('班') ? value : `${value}班`
}

function syncHomeClass(row, homeClass) {
  const cell = row.querySelector('.hc-cell')
  const formatted = formatHomeClass(homeClass)
  cell.textContent = formatted
  cell.classList.toggle('hidden', !formatted)
}

function notify(text, ok = true) {
  msg.className = `mb-4 px-4 py-3 rounded-xl text-sm font-medium fade ${ok
    ? 'bg-emerald-50 text-emerald-700 border border-emerald-100'
    : 'bg-red-50 text-red-600 border border-red-100'}`
  msg.textContent = text
  msg.classList.remove('hidden')
  setTimeout(() => msg.classList.add('hidden'), 3000)
}

function openEdit(id) {
  const row = document.getElementById(`row-${id}`)
  editStudentId = id
  document.getElementById('editStudentHint').textContent = `当前学生：${row.dataset.name}`
  document.getElementById('editStudentName').value = row.dataset.name || ''
  document.getElementById('editStudentHomeClass').value = row.dataset.homeclass || ''
  document.getElementById('editModal').classList.remove('hidden')
}

function closeEdit() {
  editStudentId = null
  document.getElementById('editModal').classList.add('hidden')
}

async function saveEdit() {
  const id = editStudentId
  const name = document.getElementById('editStudentName').value.trim()
  const homeClass = document.getElementById('editStudentHomeClass').value.trim()
  if (!name) { notify('姓名不能为空', false); return }
  const res = await fetch(`/api/students/${id}`, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name, homeClass }),
  })
  if (res.status === 401) { window.location.href = '/student'; return }
  const data = await res.json()
  if (!data.ok) { notify(data.message, false); return }
  const row = document.getElementById(`row-${id}`)
  row.dataset.name = data.student.name
  row.dataset.homeclass = data.student.homeClass || ''
  row.querySelector('.name-cell').textContent = data.student.name
  syncHomeClass(row, data.student.homeClass)
  closeEdit()
  notify('已更新')
}

async function confirmDelete(id, name) {
  if (!confirm(`确认删除学生「${name}」？`)) return
  const res = await fetch(`/api/students/${id}`, { method: 'DELETE' })
  if (res.status === 401) { window.location.href = '/student'; return }
  const data = await res.json()
  if (!data.ok) { notify(data.message, false); return }
  document.getElementById(`row-${id}`).remove()
  const cnt = document.getElementById('stuCount')
  cnt.textContent = parseInt(cnt.textContent) - 1
  notify('已删除')
}

function startTransfer(id, name) {
  transferStudentId = id
  document.getElementById('transferName').textContent = `学生：${name}`
  document.getElementById('transferModal').classList.remove('hidden')
}

function closeTransfer() {
  transferStudentId = null
  document.getElementById('transferModal').classList.add('hidden')
}

async function doTransfer() {
  const targetClassId = document.getElementById('transferTarget').value
  const res = await fetch(`/api/students/${transferStudentId}/transfer`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ targetClassId: parseInt(targetClassId) }),
  })
  if (res.status === 401) { window.location.href = '/student'; return }
  const data = await res.json()
  closeTransfer()
  if (!data.ok) { notify(data.message, false); return }
  document.getElementById(`row-${transferStudentId}`).remove()
  const cnt = document.getElementById('stuCount')
  cnt.textContent = parseInt(cnt.textContent) - 1
  notify('已转移')
}

document.querySelectorAll('#stuList > li').forEach(row => {
  syncHomeClass(row, row.dataset.homeclass)
})
</script>
</body>
</html>
