<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ cls.name }} - 数据分析</title>
  <link rel="stylesheet" href="/public/admin.css">
  <link rel="stylesheet" href="/public/tailwind.min.css">
  <style>
    /* Summary strip */
    .summary-strip {
      display: flex; gap: 1px; background: var(--hairline); border-radius: 10px;
      overflow: hidden; margin-bottom: 16px;
    }
    .summary-item {
      flex: 1; background: #fff; padding: 12px 8px; text-align: center; min-width: 0;
    }
    .summary-item .val {
      font-family: Georgia, serif; font-size: 22px; font-weight: 400;
      color: var(--ink); line-height: 1.2;
    }
    .summary-item .val.primary { color: var(--primary); }
    .summary-item .val.success { color: var(--success); }
    .summary-item .val.info { color: var(--info); }
    .summary-item .lbl { font-size: 11px; color: var(--muted-soft); margin-top: 2px; }

    /* Compact card */
    .ana-card {
      background: #fff; border-radius: 10px; border: 1px solid var(--hairline);
      margin-bottom: 12px;
    }
    .ana-card-head {
      padding: 10px 14px; border-bottom: 1px solid var(--hairline);
      display: flex; align-items: center; justify-content: space-between;
    }
    .ana-card-title { font-size: 13px; font-weight: 600; color: var(--ink); margin: 0; }
    .ana-card-body { padding: 14px; }

    /* Two-col grid */
    .ana-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }

    /* Bar chart */
    .bar-chart { display: flex; align-items: flex-end; gap: 3px; height: 120px; }
    .bar-chart .bar {
      flex: 1; background: var(--primary); border-radius: 3px 3px 0 0;
      min-width: 6px; position: relative; transition: background .15s; cursor: pointer;
    }
    .bar-chart .bar:hover { background: var(--primary-active); }
    .bar-chart .bar .tip {
      display: none; position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%);
      background: var(--surface-dark); color: var(--on-dark); padding: 3px 6px;
      border-radius: 4px; font-size: 10px; white-space: nowrap; pointer-events: none; z-index: 5;
    }
    .bar-chart .bar:hover .tip { display: block; }
    .bar-x { display: flex; gap: 3px; margin-top: 3px; }
    .bar-x span { flex: 1; text-align: center; font-size: 9px; color: var(--muted-soft); min-width: 6px; overflow: hidden; text-overflow: ellipsis; }

    /* Hour heatmap */
    .hour-grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 3px; }
    .hour-cell {
      aspect-ratio: 1; border-radius: 4px; display: flex; align-items: center;
      justify-content: center; font-size: 10px; font-weight: 500; color: var(--on-dark);
      cursor: pointer; transition: transform .1s;
    }
    .hour-cell:hover { transform: scale(1.15); }
    .hour-cell.zero { background: var(--surface-soft); color: var(--muted-soft); font-size: 9px; }

    /* Day chart */
    .day-chart { display: flex; align-items: flex-end; gap: 6px; height: 80px; }
    .day-bar {
      flex: 1; background: var(--info); border-radius: 3px 3px 0 0;
      display: flex; flex-direction: column; align-items: center; justify-content: flex-end;
      transition: background .15s; cursor: pointer;
    }
    .day-bar:hover { background: #3a7bc8; }
    .day-bar .cnt { font-size: 10px; font-weight: 600; color: var(--on-dark); padding: 1px 0; }
    .day-bar .dlbl { font-size: 9px; color: var(--muted-soft); margin-top: 4px; }

    /* Stats table */
    .stbl { width: 100%; border-collapse: collapse; font-size: 12px; }
    .stbl th {
      text-align: left; padding: 7px 10px; font-size: 11px; font-weight: 600;
      color: var(--muted-soft); border-bottom: 1px solid var(--hairline); background: var(--canvas);
    }
    .stbl td { padding: 6px 10px; border-bottom: 1px solid var(--hairline); }
    .stbl tr:last-child td { border-bottom: none; }
    .stbl td.nm { font-weight: 500; color: var(--ink); }
    .rbadge { display: inline-block; padding: 1px 8px; border-radius: 999px; font-size: 11px; font-weight: 600; }
    .rbadge.hi { background: #f0fdf4; color: #047857; }
    .rbadge.md { background: #fefce8; color: #a16207; }
    .rbadge.lo { background: #fef2f2; color: #c64545; }

    /* Personal trend */
    .ptbl { width: 100%; border-collapse: collapse; font-size: 11px; }
    .ptbl th {
      text-align: left; padding: 6px 10px; font-size: 10px; font-weight: 600;
      color: var(--muted-soft); border-bottom: 1px solid var(--hairline); background: var(--canvas);
    }
    .ptbl td { padding: 5px 10px; border-bottom: 1px solid var(--hairline); }
    .ptbl td.nm { font-weight: 500; color: var(--ink); }
    .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin: 0 1px; }
    .dot.s { background: var(--success); }
    .dot.a { background: var(--surface-card); border: 1px solid var(--hairline); }

    .loading { display: flex; align-items: center; justify-content: center; min-height: 200px; font-size: 13px; color: var(--muted-soft); }
    .empty-state { text-align: center; padding: 40px 24px; color: var(--muted-soft); }

    @media (max-width: 768px) {
      .ana-grid { grid-template-columns: 1fr; }
      .summary-strip { flex-wrap: wrap; }
      .summary-item { min-width: calc(33% - 1px); }
    }
  </style>
</head>
<body>

  <header class="header-bar">
    <div class="header-inner">
      <div class="header-left">
        <a href="/teacher/classes/{{ cls.id }}" class="nav-link">
          <svg style="width:16px;height:16px;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
          </svg>
          返回
        </a>
        <span style="color: var(--hairline);">|</span>
        <span class="page-title text-lg">{{ cls.name }} - 数据分析</span>
      </div>
    </div>
  </header>

  <main class="admin-main">
    <div id="loadingView" class="loading">加载中...</div>
    <div id="errorView" style="display:none;">
      <div class="empty-state">
        <p>暂无足够数据进行分析</p>
        <a href="/teacher/classes/{{ cls.id }}" class="nav-link" style="margin-top: 8px; display: inline-flex;">返回班级管理</a>
      </div>
    </div>
    <div id="dataView" style="display:none;">

      <!-- Summary Strip -->
      <div class="summary-strip" id="summaryStrip"></div>

      <!-- Charts Row 1 -->
      <div class="ana-grid">
        <div class="ana-card">
          <div class="ana-card-head"><p class="ana-card-title">各批次签到趋势</p></div>
          <div class="ana-card-body"><div id="trendChart"></div></div>
        </div>
        <div class="ana-card">
          <div class="ana-card-head"><p class="ana-card-title">签到时段分布</p></div>
          <div class="ana-card-body"><div id="hourChart"></div></div>
        </div>
      </div>

      <!-- Charts Row 2 -->
      <div class="ana-grid">
        <div class="ana-card">
          <div class="ana-card-head"><p class="ana-card-title">星期分布</p></div>
          <div class="ana-card-body"><div id="dayChart"></div></div>
        </div>
        <div class="ana-card">
          <div class="ana-card-head"><p class="ana-card-title">各批次出勤率</p></div>
          <div class="ana-card-body"><div id="rateChart"></div></div>
        </div>
      </div>

      <!-- Stats Table -->
      <div class="ana-card">
        <div class="ana-card-head">
          <p class="ana-card-title">出勤率统计</p>
          <span id="statsCount" style="font-size:11px;color:var(--muted-soft);"></span>
        </div>
        <div class="ana-card-body" style="padding:0;overflow-x:auto;">
          <table class="stbl" id="statsTable"></table>
        </div>
      </div>

      <!-- Personal Trend -->
      <div class="ana-card">
        <div class="ana-card-head">
          <p class="ana-card-title">个人出勤趋势（最近 5 批次）</p>
        </div>
        <div class="ana-card-body" style="padding:0;overflow-x:auto;">
          <table class="ptbl" id="personalTable"></table>
        </div>
      </div>

    </div>
  </main>

<script>
const CLASS_ID = {{ classId }}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
}

async function loadAnalytics() {
  const [analyticsRes, statsRes] = await Promise.all([
    fetch(`/api/analytics?classId=${CLASS_ID}`),
    fetch(`/api/stats?classId=${CLASS_ID}`),
  ])
  if (analyticsRes.status === 401 || analyticsRes.status === 403) { window.location.href = '/student'; return }
  const data = await analyticsRes.json()
  const stats = statsRes.ok ? await statsRes.json() : null

  if (!data.summary || data.summary.totalSessions === 0) {
    document.getElementById('loadingView').style.display = 'none'
    document.getElementById('errorView').style.display = ''
    return
  }

  document.getElementById('loadingView').style.display = 'none'
  document.getElementById('dataView').style.display = ''

  renderSummary(data.summary)
  if (stats) renderStatsTable(stats)
  renderTrendChart(data.sessionTrend)
  renderHourChart(data.hourDistribution)
  renderDayChart(data.dayDistribution)
  renderRateChart(data.sessionTrend)
  renderPersonalTable(data.personalTrend)
}

function renderSummary(s) {
  document.getElementById('summaryStrip').innerHTML = `
    <div class="summary-item"><div class="val primary">${s.totalSessions}</div><div class="lbl">总批次</div></div>
    <div class="summary-item"><div class="val">${s.totalSignIns}</div><div class="lbl">签到人次</div></div>
    <div class="summary-item"><div class="val">${s.uniqueStudents}</div><div class="lbl">班级人数</div></div>
    <div class="summary-item"><div class="val info">${s.avgPerSession}</div><div class="lbl">批次均签</div></div>
    <div class="summary-item"><div class="val success">${s.overallRate}%</div><div class="lbl">出勤率</div></div>
    <div class="summary-item"><div class="val">${s.avgSpeed}%</div><div class="lbl">前10min占比</div></div>
  `
}

function renderStatsTable(stats) {
  const table = document.getElementById('statsTable')
  const countEl = document.getElementById('statsCount')
  if (!stats.students.length) {
    table.innerHTML = '<tr><td style="text-align:center;padding:20px;color:var(--muted-soft);">暂无数据</td></tr>'
    return
  }
  countEl.textContent = stats.students.length + ' 人'
  const rows = stats.students.map(s => {
    const rate = parseFloat(s.rate)
    const c = rate >= 80 ? 'hi' : rate >= 60 ? 'md' : 'lo'
    return `<tr>
      <td class="nm">${escHtml(s.name)}</td>
      <td>${escHtml(s.homeClass || '-')}</td>
      <td>${s.signedCount}</td>
      <td>${s.absentCount}</td>
      <td><span class="rbadge ${c}">${s.rate}%</span></td>
    </tr>`
  }).join('')
  table.innerHTML = `<thead><tr><th>姓名</th><th>行政班</th><th>签到</th><th>缺勤</th><th>出勤率</th></tr></thead><tbody>${rows}</tbody>`
}

function renderTrendChart(sessions) {
  const el = document.getElementById('trendChart')
  if (!sessions.length) { el.innerHTML = '<div style="text-align:center;padding:16px;color:var(--muted-soft);font-size:12px;">暂无数据</div>'; return }
  const max = Math.max(...sessions.map(s => s.count), 1)
  const bars = sessions.map(s => {
    const h = Math.max((s.count / max) * 110, 4)
    return `<div class="bar" style="height:${h}px;"><span class="tip">${escHtml(s.label.split(' · ')[0])}: ${s.count}人 (${s.rate}%)</span></div>`
  }).join('')
  const labels = sessions.map(s => {
    const p = s.label.split(' · ')[0]
    return `<span title="${escHtml(s.label)}">${escHtml(p.length > 8 ? p.slice(0,8)+'…' : p)}</span>`
  }).join('')
  el.innerHTML = `<div class="bar-chart">${bars}</div><div class="bar-x">${labels}</div>`
}

function renderRateChart(sessions) {
  const el = document.getElementById('rateChart')
  if (!sessions.length) { el.innerHTML = '<div style="text-align:center;padding:16px;color:var(--muted-soft);font-size:12px;">暂无数据</div>'; return }
  const max = Math.max(...sessions.map(s => parseFloat(s.rate)), 1)
  const bars = sessions.map(s => {
    const r = parseFloat(s.rate)
    const h = Math.max((r / max) * 110, 4)
    const c = r >= 80 ? 'var(--success)' : r >= 60 ? 'var(--warning)' : 'var(--error)'
    return `<div class="bar" style="height:${h}px;background:${c};"><span class="tip">${escHtml(s.label.split(' · ')[0])}: ${s.rate}%</span></div>`
  }).join('')
  const labels = sessions.map(s => {
    const p = s.label.split(' · ')[0]
    return `<span title="${escHtml(s.label)}">${escHtml(p.length > 8 ? p.slice(0,8)+'…' : p)}</span>`
  }).join('')
  el.innerHTML = `<div class="bar-chart">${bars}</div><div class="bar-x">${labels}</div>`
}

function renderHourChart(dist) {
  const el = document.getElementById('hourChart')
  const max = Math.max(...dist, 1)
  let html = '<div class="hour-grid">'
  for (let h = 0; h < 24; h++) {
    const v = dist[h]
    const op = v > 0 ? Math.max(v / max, 0.15) : 0
    const cls = v > 0 ? '' : ' zero'
    html += `<div class="hour-cell${cls}" style="background:rgba(204,120,92,${op});" title="${h}:00 - ${v}次">${v > 0 ? v : '-'}</div>`
  }
  html += '</div>'
  html += '<div style="display:flex;justify-content:space-between;margin-top:6px;font-size:9px;color:var(--muted-soft);"><span>0</span><span>6</span><span>12</span><span>18</span><span>23</span></div>'
  el.innerHTML = html
}

function renderDayChart(dist) {
  const el = document.getElementById('dayChart')
  const days = ['日','一','二','三','四','五','六']
  const max = Math.max(...dist, 1)
  const bars = dist.map((v, i) => {
    const h = Math.max((v / max) * 70, 4)
    return `<div class="day-bar" style="height:${h}px;"><span class="cnt">${v}</span><span class="dlbl">周${days[i]}</span></div>`
  }).join('')
  el.innerHTML = `<div class="day-chart">${bars}</div>`
}

function renderPersonalTable(trends) {
  const table = document.getElementById('personalTable')
  if (!trends.length) { table.innerHTML = '<tr><td style="text-align:center;padding:16px;color:var(--muted-soft);">暂无数据</td></tr>'; return }
  const rows = trends.map(t => {
    const dots = t.history.map(h =>
      `<span class="dot ${h.signed ? 's' : 'a'}" title="${escHtml(h.label)}: ${h.signed ? '签到' : '缺勤'}"></span>`
    ).join('')
    return `<tr><td class="nm">${escHtml(t.name)}</td><td>${dots}</td></tr>`
  }).join('')
  table.innerHTML = `<thead><tr><th style="width:80px;">姓名</th><th>签到记录</th></tr></thead><tbody>${rows}</tbody>`
}

loadAnalytics()
</script>
</body>
</html>
