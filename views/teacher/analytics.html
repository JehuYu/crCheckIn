<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ cls.name }} - 数据分析</title>
  <link rel="stylesheet" href="/public/admin.css">
  <link rel="stylesheet" href="/public/tailwind.min.css">
  <style>
    /* ── KPI Row ── */
    .kpi-row {
      display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; margin-bottom: 16px;
    }
    .kpi {
      background: #fff; border: 1px solid var(--hairline); border-radius: 10px;
      padding: 14px 12px; position: relative; overflow: hidden;
    }
    .kpi::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    }
    .kpi.kpi-primary::before { background: var(--primary); }
    .kpi.kpi-success::before { background: var(--success); }
    .kpi.kpi-info::before { background: var(--info); }
    .kpi .kpi-val {
      font-family: Georgia, serif; font-size: 26px; font-weight: 400;
      color: var(--ink); line-height: 1;
    }
    .kpi .kpi-val.primary { color: var(--primary); }
    .kpi .kpi-val.success { color: var(--success); }
    .kpi .kpi-val.info { color: var(--info); }
    .kpi .kpi-lbl { font-size: 11px; color: var(--muted-soft); margin-top: 6px; }

    /* ── Section Card ── */
    .sec {
      background: #fff; border: 1px solid var(--hairline); border-radius: 10px;
      margin-bottom: 12px; overflow: hidden;
    }
    .sec-head {
      padding: 10px 16px; border-bottom: 1px solid var(--hairline);
      display: flex; align-items: center; justify-content: space-between;
    }
    .sec-title { font-size: 13px; font-weight: 600; color: var(--ink); margin: 0; }
    .sec-badge {
      font-size: 11px; color: var(--muted-soft); background: var(--surface-soft);
      padding: 2px 8px; border-radius: 999px;
    }
    .sec-body { padding: 16px; }
    .sec-body-np { padding: 0; }

    /* ── Grid layouts ── */
    .g2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
    .g3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 12px; }

    /* ── Bar Chart ── */
    .bchart { display: flex; align-items: flex-end; gap: 3px; height: 130px; }
    .bchart .bar {
      flex: 1; background: var(--primary); border-radius: 3px 3px 0 0;
      min-width: 5px; position: relative; transition: opacity .15s; cursor: pointer; opacity: .85;
    }
    .bchart .bar:hover { opacity: 1; }
    .bchart .bar .tp {
      display: none; position: absolute; bottom: calc(100% + 4px); left: 50%; transform: translateX(-50%);
      background: var(--surface-dark); color: var(--on-dark); padding: 4px 8px;
      border-radius: 5px; font-size: 10px; white-space: nowrap; pointer-events: none; z-index: 10;
      box-shadow: 0 4px 12px rgba(0,0,0,.15);
    }
    .bchart .bar:hover .tp { display: block; }
    .bx { display: flex; gap: 3px; margin-top: 4px; }
    .bx span { flex: 1; text-align: center; font-size: 9px; color: var(--muted-soft); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* ── Rate bar (horizontal) ── */
    .rbar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    .rbar-row:last-child { margin-bottom: 0; }
    .rbar-label { font-size: 11px; color: var(--muted); width: 70px; flex-shrink: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; text-align: right; }
    .rbar-track { flex: 1; height: 14px; background: var(--surface-soft); border-radius: 3px; overflow: hidden; position: relative; }
    .rbar-fill { height: 100%; border-radius: 3px; transition: width .3s; }
    .rbar-val { font-size: 10px; font-weight: 600; color: var(--ink); width: 36px; text-align: right; flex-shrink: 0; }

    /* ── Heatmap ── */
    .hmap { display: grid; grid-template-columns: repeat(8, 1fr); gap: 4px; }
    .hcell {
      aspect-ratio: 1; border-radius: 5px; display: flex; align-items: center;
      justify-content: center; font-size: 10px; font-weight: 600; cursor: pointer;
      transition: transform .1s, box-shadow .15s;
    }
    .hcell:hover { transform: scale(1.1); box-shadow: 0 2px 8px rgba(0,0,0,.1); }
    .hcell.z { background: var(--surface-soft); color: var(--muted-soft); font-weight: 400; }

    /* ── Day bars ── */
    .day-bars { display: flex; align-items: flex-end; gap: 8px; height: 90px; }
    .dbar {
      flex: 1; border-radius: 4px 4px 0 0; display: flex; flex-direction: column;
      align-items: center; justify-content: flex-end; cursor: pointer; transition: opacity .15s;
    }
    .dbar:hover { opacity: .8; }
    .dbar .dc { font-size: 10px; font-weight: 700; color: #fff; padding: 2px 0; }
    .dbar .dl { font-size: 10px; color: var(--muted-soft); margin-top: 6px; }

    /* ── Multi-column name list ── */
    .name-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1px; background: var(--hairline); }
    .name-grid > div { background: #fff; }
    .nrow {
      display: flex; align-items: center; gap: 8px; padding: 6px 12px;
      font-size: 12px; border-bottom: 1px solid var(--hairline);
    }
    .nrow:last-child { border-bottom: none; }
    .nrow .nm { font-weight: 500; color: var(--ink); min-width: 56px; flex-shrink: 0; }
    .nrow .hc { font-size: 11px; color: var(--muted-soft); min-width: 56px; flex-shrink: 0; }
    .nrow .dots { display: flex; gap: 2px; margin-left: auto; }
    .nrow .dot { width: 8px; height: 8px; border-radius: 50%; }
    .nrow .dot.s { background: var(--success); }
    .nrow .dot.a { background: var(--surface-card); border: 1px solid var(--hairline); }
    .rbadge { display: inline-block; padding: 1px 7px; border-radius: 999px; font-size: 11px; font-weight: 600; }
    .rbadge.hi { background: #f0fdf4; color: #047857; }
    .rbadge.md { background: #fefce8; color: #a16207; }
    .rbadge.lo { background: #fef2f2; color: #c64545; }

    .loading { display: flex; align-items: center; justify-content: center; min-height: 200px; font-size: 13px; color: var(--muted-soft); }
    .empty-state { text-align: center; padding: 40px 24px; color: var(--muted-soft); }

    @media (max-width: 900px) {
      .kpi-row { grid-template-columns: repeat(3, 1fr); }
      .g2, .g3 { grid-template-columns: 1fr; }
      .name-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 640px) {
      .kpi-row { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

  <header class="header-bar">
    <div class="header-inner">
      <div class="header-left">
        <a href="/teacher/classes/{{ cls.id }}" class="nav-link">
          <svg style="width:16px;height:16px;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
          </svg>
          返回
        </a>
        <span style="color: var(--hairline);">|</span>
        <span class="page-title text-lg">{{ cls.name }} - 数据分析</span>
      </div>
    </div>
  </header>

  <main class="admin-main">
    <div id="loadingView" class="loading">加载中...</div>
    <div id="errorView" style="display:none;">
      <div class="empty-state">
        <p>暂无足够数据进行分析</p>
        <a href="/teacher/classes/{{ cls.id }}" class="nav-link" style="margin-top: 8px; display: inline-flex;">返回班级管理</a>
      </div>
    </div>
    <div id="dataView" style="display:none;">

      <!-- KPI Row -->
      <div class="kpi-row" id="kpiRow"></div>

      <!-- Charts Row 1: Trend + Hour Heatmap -->
      <div class="g2">
        <div class="sec">
          <div class="sec-head"><p class="sec-title">各批次签到趋势</p></div>
          <div class="sec-body"><div id="trendChart"></div></div>
        </div>
        <div class="sec">
          <div class="sec-head"><p class="sec-title">签到时段分布</p></div>
          <div class="sec-body"><div id="hourChart"></div></div>
        </div>
      </div>

      <!-- Charts Row 2: Rate bars + Day distribution -->
      <div class="g2">
        <div class="sec">
          <div class="sec-head"><p class="sec-title">各批次出勤率</p></div>
          <div class="sec-body" id="rateBars"></div>
        </div>
        <div class="sec">
          <div class="sec-head"><p class="sec-title">星期分布</p></div>
          <div class="sec-body"><div id="dayChart"></div></div>
        </div>
      </div>

      <!-- Stats Table (multi-column) -->
      <div class="sec">
        <div class="sec-head">
          <p class="sec-title">出勤率统计</p>
          <span class="sec-badge" id="statsCount"></span>
        </div>
        <div class="sec-body-np">
          <div class="name-grid" id="statsGrid"></div>
        </div>
      </div>

      <!-- Personal Trend (multi-column) -->
      <div class="sec">
        <div class="sec-head">
          <p class="sec-title">个人出勤趋势（最近 5 批次）</p>
        </div>
        <div class="sec-body-np">
          <div class="name-grid" id="personalGrid"></div>
        </div>
      </div>

    </div>
  </main>

<script>
const CLASS_ID = {{ classId }}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
}

async function loadAnalytics() {
  const [analyticsRes, statsRes] = await Promise.all([
    fetch(`/api/analytics?classId=${CLASS_ID}`),
    fetch(`/api/stats?classId=${CLASS_ID}`),
  ])
  if (analyticsRes.status === 401 || analyticsRes.status === 403) { window.location.href = '/student'; return }
  const data = await analyticsRes.json()
  const stats = statsRes.ok ? await statsRes.json() : null

  if (!data.summary || data.summary.totalSessions === 0) {
    document.getElementById('loadingView').style.display = 'none'
    document.getElementById('errorView').style.display = ''
    return
  }

  document.getElementById('loadingView').style.display = 'none'
  document.getElementById('dataView').style.display = ''

  renderKpi(data.summary)
  if (stats) renderStatsGrid(stats)
  renderTrendChart(data.sessionTrend)
  renderHourChart(data.hourDistribution)
  renderDayChart(data.dayDistribution)
  renderRateBars(data.sessionTrend)
  renderPersonalGrid(data.personalTrend)
}

function renderKpi(s) {
  const kpis = [
    { val: s.totalSessions, lbl: '总批次', cls: 'kpi-primary', vcls: 'primary' },
    { val: s.totalSignIns, lbl: '签到人次', cls: '', vcls: '' },
    { val: s.uniqueStudents, lbl: '班级人数', cls: '', vcls: '' },
    { val: s.avgPerSession, lbl: '批次均签', cls: 'kpi-info', vcls: 'info' },
    { val: s.overallRate + '%', lbl: '整体出勤率', cls: 'kpi-success', vcls: 'success' },
    { val: s.avgSpeed + '%', lbl: '前10min签到占比', cls: '', vcls: '' },
  ]
  document.getElementById('kpiRow').innerHTML = kpis.map(k =>
    `<div class="kpi ${k.cls}"><div class="kpi-val ${k.vcls}">${k.val}</div><div class="kpi-lbl">${k.lbl}</div></div>`
  ).join('')
}

function renderStatsGrid(stats) {
  const el = document.getElementById('statsGrid')
  const countEl = document.getElementById('statsCount')
  if (!stats.students.length) {
    el.innerHTML = '<div style="text-align:center;padding:24px;color:var(--muted-soft);grid-column:1/-1;">暂无数据</div>'
    return
  }
  countEl.textContent = stats.students.length + ' 人'
  el.innerHTML = stats.students.map(s => {
    const rate = parseFloat(s.rate)
    const c = rate >= 80 ? 'hi' : rate >= 60 ? 'md' : 'lo'
    return `<div class="nrow">
      <span class="nm">${escHtml(s.name)}</span>
      <span class="hc">${escHtml(s.homeClass || '')}</span>
      <span style="font-size:11px;color:var(--muted);">${s.signedCount}/${s.signedCount + s.absentCount}</span>
      <span class="rbadge ${c}" style="margin-left:auto;">${s.rate}%</span>
    </div>`
  }).join('')
}

function renderTrendChart(sessions) {
  const el = document.getElementById('trendChart')
  if (!sessions.length) { el.innerHTML = '<div style="text-align:center;padding:20px;color:var(--muted-soft);font-size:12px;">暂无数据</div>'; return }
  const max = Math.max(...sessions.map(s => s.count), 1)
  const bars = sessions.map(s => {
    const h = Math.max((s.count / max) * 120, 4)
    return `<div class="bar" style="height:${h}px;"><span class="tp">${escHtml(s.label.split(' · ')[0])}: ${s.count}人 (${s.rate}%)</span></div>`
  }).join('')
  const labels = sessions.map(s => {
    const p = s.label.split(' · ')[0]
    return `<span title="${escHtml(s.label)}">${escHtml(p.length > 6 ? p.slice(0,6)+'…' : p)}</span>`
  }).join('')
  el.innerHTML = `<div class="bchart">${bars}</div><div class="bx">${labels}</div>`
}

function renderRateBars(sessions) {
  const el = document.getElementById('rateBars')
  if (!sessions.length) { el.innerHTML = '<div style="text-align:center;padding:20px;color:var(--muted-soft);font-size:12px;">暂无数据</div>'; return }
  el.innerHTML = sessions.map(s => {
    const r = parseFloat(s.rate)
    const color = r >= 80 ? 'var(--success)' : r >= 60 ? 'var(--warning)' : 'var(--error)'
    const p = s.label.split(' · ')[0]
    const short = p.length > 8 ? p.slice(0,8)+'…' : p
    return `<div class="rbar-row">
      <span class="rbar-label" title="${escHtml(s.label)}">${escHtml(short)}</span>
      <div class="rbar-track"><div class="rbar-fill" style="width:${r}%;background:${color};"></div></div>
      <span class="rbar-val">${s.rate}%</span>
    </div>`
  }).join('')
}

function renderHourChart(dist) {
  const el = document.getElementById('hourChart')
  const max = Math.max(...dist, 1)
  let html = '<div class="hmap">'
  for (let h = 0; h < 24; h++) {
    const v = dist[h]
    const op = v > 0 ? Math.max(v / max, 0.12) : 0
    const cls = v > 0 ? '' : ' z'
    html += `<div class="hcell${cls}" style="background:rgba(204,120,92,${v > 0 ? op : 1});" title="${h}:00 — ${v}次">${v > 0 ? v : h}</div>`
  }
  html += '</div>'
  el.innerHTML = html
}

function renderDayChart(dist) {
  const el = document.getElementById('dayChart')
  const days = ['日','一','二','三','四','五','六']
  const max = Math.max(...dist, 1)
  const colors = ['#e8d5c4','#cc785c','#d4a017','#5db872','#4a90d9','#7c6cf0','#c64545']
  const bars = dist.map((v, i) => {
    const h = Math.max((v / max) * 80, 4)
    return `<div class="dbar" style="height:${h}px;background:${colors[i]};"><span class="dc">${v}</span><span class="dl">周${days[i]}</span></div>`
  }).join('')
  el.innerHTML = `<div class="day-bars">${bars}</div>`
}

function renderPersonalGrid(trends) {
  const el = document.getElementById('personalGrid')
  if (!trends.length) { el.innerHTML = '<div style="text-align:center;padding:24px;color:var(--muted-soft);grid-column:1/-1;">暂无数据</div>'; return }
  el.innerHTML = trends.map(t => {
    const dots = t.history.map(h =>
      `<span class="dot ${h.signed ? 's' : 'a'}" title="${escHtml(h.label)}: ${h.signed ? '签到' : '缺勤'}"></span>`
    ).join('')
    return `<div class="nrow"><span class="nm">${escHtml(t.name)}</span><span class="dots">${dots}</span></div>`
  }).join('')
}

loadAnalytics()
</script>
</body>
</html>
