<!doctype html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% if cls %}{{ cls.name }} - {% endif %}学生签到</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/public/design-system.css">
  <link rel="stylesheet" href="/public/tailwind.min.css">
  <style>
    :root {
      --canvas: #faf9f5;
      --surface-card: #efe9de;
      --surface-dark: #181715;
      --surface-dark-elevated: #252320;
      --primary: #cc785c;
      --primary-active: #a9583e;
      --primary-disabled: #e6dfd8;
      --ink: #141413;
      --body: #3d3d3a;
      --body-strong: #252523;
      --muted: #6c6a64;
      --muted-soft: #8e8b82;
      --hairline: #e6dfd8;
      --on-primary: #ffffff;
      --on-dark: #faf9f5;
      --on-dark-soft: #a09d96;
      --success: #5db872;
      --warning: #d4a017;
      --error: #c64545;
      --radius-xs: 4px;
      --radius-sm: 6px;
      --radius-md: 8px;
      --radius-lg: 12px;
      --radius-xl: 16px;
      --radius-pill: 9999px;
      --spacing-xs: 8px;
      --spacing-sm: 12px;
      --spacing-md: 16px;
      --spacing-lg: 24px;
      --spacing-xl: 32px;
      --spacing-xxl: 48px;
      --input-bg: #faf9f5;
      --input-bg-active: #f5f0e8;
      --input-border: #e6dfd8;
      --input-border-sep: #e6dfd8;
      --input-placeholder: #8e8b82;
      --input-focus-shadow1: rgba(204,120,92,.2);
      --input-focus-shadow2: rgba(20,20,19,.06);
      --suggestions-bg: #ffffff;
      --suggestions-border: #e6dfd8;
      --suggestions-item-border: #e6dfd8;
      --suggestions-hover: #faf9f5;
      --selected-chip-bg: #efe9de;
      --selected-chip-border: #e6dfd8;
      --clock-opacity: .6;
      --clock-color: #6c6a64;
      --toggle-bg: rgba(0,0,0,.04);
      --toggle-border: rgba(0,0,0,.08);
      --toggle-hover: rgba(0,0,0,.08);
    }

    [data-theme="dark"] {
      --input-bg: #252320;
      --input-bg-active: #1f1e1b;
      --input-border: rgba(255,255,255,.12);
      --input-border-sep: rgba(255,255,255,.08);
      --input-placeholder: #a09d96;
      --input-focus-shadow1: rgba(204,120,92,.15);
      --input-focus-shadow2: rgba(0,0,0,.3);
      --suggestions-bg: #252320;
      --suggestions-border: rgba(255,255,255,.08);
      --suggestions-item-border: rgba(255,255,255,.06);
      --suggestions-hover: rgba(255,255,255,.04);
      --selected-chip-bg: #252320;
      --selected-chip-border: rgba(255,255,255,.06);
      --clock-opacity: .5;
      --clock-color: #a09d96;
      --toggle-bg: rgba(255,255,255,.06);
      --toggle-border: rgba(255,255,255,.08);
      --toggle-hover: rgba(255,255,255,.1);
    }

    * {
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: var(--canvas);
      color: var(--body);
      margin: 0;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* === Theme Toggle — top-right === */
    .theme-toggle {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 100;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1px solid var(--toggle-border);
      background: var(--toggle-bg);
      color: var(--on-dark);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .2s, color .3s;
    }
    .theme-toggle:hover { background: var(--toggle-hover); }
    .theme-toggle svg { width: 18px; height: 18px; }
    [data-theme="dark"] .icon-sun { display: none; }
    [data-theme="light"] .icon-moon { display: none; }

    /* === Dark Banner === */
    .signin-banner {
      background: var(--surface-dark);
      padding: var(--spacing-xxl) var(--spacing-lg) var(--spacing-xl);
      position: relative;
      overflow: hidden;
    }
    .signin-banner::before {
      content: '';
      position: absolute;
      top: -60%;
      right: -15%;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(204,120,92,.10), transparent 70%);
      pointer-events: none;
    }
    .signin-banner-inner {
      max-width: 1200px;
      margin: 0 auto;
      position: relative;
    }
    .banner-title {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 48px;
      font-weight: 400;
      letter-spacing: -1px;
      line-height: 1.1;
      color: var(--on-dark);
      margin: 0 0 var(--spacing-md) 0;
    }
    .banner-meta {
      display: flex;
      gap: var(--spacing-sm);
      flex-wrap: wrap;
      align-items: center;
    }
    .banner-meta-item {
      display: inline-flex;
      align-items: center;
      gap: var(--spacing-xs);
      padding: var(--spacing-xs) var(--spacing-sm);
      border-radius: var(--radius-md);
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.1);
      color: var(--on-dark-soft);
      font-size: 13px;
      font-weight: 500;
    }
    .banner-meta-item .dot {
      width: 8px;
      height: 8px;
      border-radius: var(--radius-pill);
      background: var(--success);
    }

    /* === Form Area === */
    .signin-body {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: var(--spacing-xxl) var(--spacing-lg) var(--spacing-xxl);
      background: var(--canvas);
    }
    .signin-card {
      width: 100%;
      max-width: 480px;
      background: #fff;
      border-radius: var(--radius-lg);
      border: 1px solid var(--hairline);
      padding: var(--spacing-xl);
    }
    .signin-card-title {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 28px;
      font-weight: 400;
      letter-spacing: -0.3px;
      color: var(--ink);
      margin: 0 0 var(--spacing-sm) 0;
      line-height: 1.2;
    }
    .signin-card-sub {
      font-size: 14px;
      color: var(--muted);
      margin: 0 0 var(--spacing-lg) 0;
      line-height: 1.55;
    }

    /* === Field Row — input + button === */
    .field-row {
      display: flex;
      align-items: center;
      border-radius: var(--radius-md);
      border: 1px solid var(--input-border);
      background: var(--input-bg);
      transition: border-color .15s, box-shadow .15s;
      height: 40px;
      overflow: hidden;
    }
    .field-row:focus-within {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--input-focus-shadow1);
    }
    .field-row .field-input {
      border: none;
      background: transparent;
      box-shadow: none;
      border-radius: 0;
      height: 40px;
    }
    .field-divider {
      width: 1px;
      background: var(--input-border-sep);
      flex-shrink: 0;
    }
    .reselect-btn {
      padding: 0 var(--spacing-sm);
      border: none;
      background: transparent;
      color: var(--muted);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      transition: background .15s, color .15s;
      height: 40px;
      display: flex;
      align-items: center;
    }
    .reselect-btn:hover { background: rgba(204,120,92,.08); color: var(--primary); }

    /* Input — design system text-input */
    .field-group {
      margin-bottom: var(--spacing-md);
      position: relative;
    }
    .field-label {
      display: block;
      margin-bottom: var(--spacing-xs);
      font-size: 13px;
      font-weight: 500;
      color: var(--ink);
    }
    .field-input {
      width: 100%;
      padding: 10px 14px;
      border-radius: var(--radius-md);
      border: 1px solid var(--hairline);
      font-size: 16px;
      line-height: 1.55;
      color: var(--ink);
      background: var(--canvas);
      height: 40px;
      box-sizing: border-box;
      transition: border-color .15s, box-shadow .15s;
    }
    .field-input::placeholder { color: var(--muted-soft); }
    .field-input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(204,120,92,.15);
    }

    /* Button — design system button-primary */
    .submit-btn {
      width: 100%;
      padding: 12px 20px;
      border: none;
      border-radius: var(--radius-md);
      background: var(--primary);
      color: var(--on-primary);
      font-size: 14px;
      font-weight: 500;
      height: 40px;
      cursor: pointer;
      transition: background .15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--spacing-xs);
      font-family: inherit;
    }
    .submit-btn:hover { background: var(--primary-active); }
    .submit-btn:disabled {
      opacity: 1;
      background: var(--primary-disabled);
      color: var(--muted);
      cursor: not-allowed;
    }

    /* Suggestions */
    #suggestions {
      position: relative;
      z-index: 10;
      margin-top: 4px;
      background: var(--suggestions-bg);
      border: 1px solid var(--suggestions-border);
      border-radius: var(--radius-md);
      box-shadow: 0 1px 3px rgba(20,20,19,.08);
      overflow: hidden;
      display: none;
      max-height: 220px;
      overflow-y: auto;
    }

    /* Selected chip */
    .selected-chip {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--spacing-sm) var(--spacing-md);
      border-radius: var(--radius-pill);
      background: var(--selected-chip-bg);
      font-size: 13px;
      font-weight: 500;
      color: var(--ink);
      margin-bottom: var(--spacing-md);
    }
    .selected-chip button {
      background: none;
      border: none;
      color: var(--primary);
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      padding: 2px 6px;
      border-radius: var(--radius-xs);
      transition: background .15s;
    }
    .selected-chip button:hover { background: rgba(204,120,92,.1); }

    /* Status */
    .status-panel {
      text-align: center;
      padding: var(--spacing-xl);
      border-radius: var(--radius-lg);
      border: 1px solid #b7e4c7;
      background: #f0fdf4;
    }
    .msg-box {
      margin-top: var(--spacing-md);
      padding: var(--spacing-sm) var(--spacing-md);
      border-radius: var(--radius-md);
      font-size: 14px;
      font-weight: 500;
    }
    .signin-footer {
      margin-top: var(--spacing-xl);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--spacing-sm);
    }
    #liveClock {
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.5px;
      color: var(--clock-color);
      opacity: var(--clock-opacity);
      transition: color .3s;
    }

    /* Info panel */
    .info-panel {
      margin-top: var(--spacing-md);
      padding: var(--spacing-sm) var(--spacing-md);
      background: #fef3ec;
      border: 1px solid #f5d0b5;
      border-radius: var(--radius-md);
    }

    /* Responsive */
    @media (max-width: 768px) {
      .signin-banner { padding: var(--spacing-xxl) var(--spacing-md) var(--spacing-lg); }
      .banner-title { font-size: 32px; }
      .signin-body { padding: var(--spacing-xl) var(--spacing-md) var(--spacing-xxl); }
      .signin-card { padding: var(--spacing-lg); }
    }
  </style>
</head>
<body>

  <!-- Theme Toggle -->
  <button class="theme-toggle" id="themeToggle" aria-label="切换主题">
    <svg class="icon-moon" fill="currentColor" viewBox="0 0 24 24"><path d="M21.752 15.002A9.718 9.718 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z"/></svg>
    <svg class="icon-sun" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2.25a.75.75 0 01.75.75v2.25a.75.75 0 01-1.5 0V3a.75.75 0 01.75-.75zM7.5 12a4.5 4.5 0 119 0 4.5 4.5 0 01-9 0zM18.894 6.166a.75.75 0 00-1.06-1.06l-1.591 1.59a.75.75 0 101.06 1.061l1.591-1.59zM21.75 12a.75.75 0 01-.75.75h-2.25a.75.75 0 010-1.5H21a.75.75 0 01.75.75zM17.834 18.894a.75.75 0 001.06-1.06l-1.59-1.591a.75.75 0 10-1.061 1.06l1.59 1.591zM12 18a.75.75 0 01.75.75V21a.75.75 0 01-1.5 0v-2.25A.75.75 0 0112 18zM7.758 17.303a.75.75 0 00-1.061-1.06l-1.591 1.59a.75.75 0 001.06 1.061l1.591-1.59zM6 12a.75.75 0 01-.75.75H3a.75.75 0 010-1.5h2.25A.75.75 0 016 12zM6.697 7.757a.75.75 0 001.06-1.06l-1.59-1.591a.75.75 0 00-1.061 1.06l1.59 1.591z"/></svg>
  </button>

  <!-- Dark Banner -->
  <div class="signin-banner">
    <div class="signin-banner-inner">
      <h1 class="banner-title">
        {% if cls %}{{ cls.name }}{% else %}机房签到{% endif %}
      </h1>
      <div class="banner-meta">
        <div class="banner-meta-item">
          <span class="dot"></span>
          <span>{{ computer_name }}</span>
        </div>
        {% if cls %}
        <div class="banner-meta-item">
          <span style="font-weight: 600; color: var(--on-dark);">{{ studentCount }}</span>
          <span>名学生</span>
        </div>
        {% endif %}
        {% if not cls %}
        <div class="banner-meta-item" style="border-color: rgba(212,160,23,.3);">
          <span style="color: var(--warning);">!</span>
          <span>未指定班级，将搜索全部学生</span>
        </div>
        {% endif %}
      </div>
    </div>
  </div>

  <!-- Canvas Body -->
  <div class="signin-body">
    <div class="signin-card">

      <h2 class="signin-card-title">提交签到</h2>
      <p class="signin-card-sub">输入姓名搜索，选择后点击提交</p>

      <!-- 已签到状态 -->
      <div id="alreadySignedPanel" class="status-panel hidden">
        <div class="inline-flex items-center justify-center w-14 h-14 rounded-full mb-4" style="background: #d1fae5;">
          <svg class="w-7 h-7" style="color: var(--success);" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
          </svg>
        </div>
        <p class="text-base font-medium" style="color: #047857;" id="alreadySignedText"></p>
        <p class="text-sm mt-2" style="color: var(--muted);">本设备已完成签到，如需重新签到请联系老师</p>
      </div>

      <!-- 信息收集提示 -->
      <div id="infoCollectionPanel" class="hidden">
        <div class="info-panel">
          <div style="display: flex; align-items: flex-start; gap: 10px;">
            <svg style="width: 18px; height: 18px; color: var(--primary); flex-shrink: 0;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
            <div style="flex: 1;">
              <p style="font-size: 12px; font-weight: 600; color: var(--ink); margin: 0 0 3px;">需要提交信息</p>
              <p style="font-size: 11px; color: var(--muted); margin: 0 0 10px;">老师要求提交相关信息，请点击下方按钮完成提交</p>
              <a id="infoSubmitLink" href="#" style="display: inline-flex; align-items: center; gap: 4px; font-size: 12px; font-weight: 600; color: var(--primary); text-decoration: none; padding: 6px 10px; border-radius: var(--radius-sm); background: rgba(204,120,92,.1); transition: background .12s;" onmouseover="this.style.background='rgba(204,120,92,.2)'" onmouseout="this.style.background='rgba(204,120,92,.1)'">
                去提交
                <svg style="width: 12px; height: 12px;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                </svg>
              </a>
            </div>
          </div>
        </div>
      </div>

      <!-- 签到表单 -->
      <div id="signInForm">
        <div class="field-group">
          <label class="field-label" for="nameInput">姓名</label>
          <div class="field-row">
            <input id="nameInput" type="text" autocomplete="off" placeholder="输入姓名片段搜索..." class="field-input" />
            <div class="field-divider"></div>
            <button id="clearSelection" class="reselect-btn hidden">重新选择</button>
          </div>
          <div id="suggestions"></div>
        </div>

        <div id="selectedInfo" class="selected-chip hidden">
          <span id="selectedText"></span>
        </div>

        <button id="signinBtn" class="submit-btn">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
          </svg>
          提交签到
        </button>

        <div id="msg" class="msg-box hidden"></div>
      </div>

      <div class="signin-footer">
        <span id="liveClock"></span>
      </div>

    </div>
  </div>

<script>
const CLASS_ID = {% if cls %}{{ cls.id }}{% else %}null{% endif %}
const STORAGE_KEY = 'signin_record' + (CLASS_ID ? '_' + CLASS_ID : '')
const THEME_KEY = 'signin_theme'

/* === Theme === */
function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme)
  localStorage.setItem(THEME_KEY, theme)
}
;(function initTheme() {
  const saved = localStorage.getItem(THEME_KEY)
  if (saved === 'light' || saved === 'dark') applyTheme(saved)
  else applyTheme('light')
})()
document.getElementById('themeToggle').addEventListener('click', () => {
  const current = document.documentElement.getAttribute('data-theme')
  applyTheme(current === 'dark' ? 'light' : 'dark')
})

/* === Live clock === */
function updateClock() {
  const now = new Date()
  const h = String(now.getHours()).padStart(2, '0')
  const m = String(now.getMinutes()).padStart(2, '0')
  const s = String(now.getSeconds()).padStart(2, '0')
  document.getElementById('liveClock').textContent = `${h}:${m}:${s}`
}
updateClock()
setInterval(updateClock, 1000)

/**
 * HTML 转义，防止 XSS
 */
function esc(str) {
  if (str == null) return ''
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')
}

const input = document.getElementById('nameInput')
const suggestions = document.getElementById('suggestions')
const msg = document.getElementById('msg')
const selectedInfo = document.getElementById('selectedInfo')
const selectedText = document.getElementById('selectedText')
const signInForm = document.getElementById('signInForm')
const alreadySignedPanel = document.getElementById('alreadySignedPanel')

let selectedClassId = null
let selectedStudentId = null
let debounceTimer = null

function checkAlreadySigned() {
  const record = localStorage.getItem(STORAGE_KEY)
  if (!record) return
  try {
    const { name, className, signedAt, studentId } = JSON.parse(record)
    document.getElementById('alreadySignedText').textContent =
      `${name}（${className}）已于 ${signedAt} 签到成功`
    selectedStudentId = studentId || null
    alreadySignedPanel.classList.remove('hidden')
    signInForm.classList.add('hidden')
    checkInfoCollection()
  } catch (e) {
    localStorage.removeItem(STORAGE_KEY)
  }
}

async function checkInfoCollection() {
  if (!CLASS_ID) return
  try {
    const res = await fetch(`/api/info-collection?classId=${CLASS_ID}`)
    const data = await res.json()
    if (data.enabled && data.fields && data.fields.length > 0) {
      const record = localStorage.getItem(STORAGE_KEY)
      if (record) {
        const { name } = JSON.parse(record)
        const link = document.getElementById('infoSubmitLink')
        const studentIdParam = selectedStudentId ? `&studentId=${selectedStudentId}` : ''
        link.href = `/student/info-submit?classId=${CLASS_ID}&studentName=${encodeURIComponent(name)}${studentIdParam}`
        document.getElementById('infoCollectionPanel').classList.remove('hidden')
      }
    }
  } catch (e) {
    console.error('Check info collection failed:', e)
  }
}

function setMessage(text, ok = false) {
  msg.className = 'msg-box'
  msg.style.background = ok ? '#f0fdf4' : '#fef2f2'
  msg.style.color = ok ? '#047857' : '#c64545'
  msg.style.border = ok ? '1px solid #b7e4c7' : '1px solid #f5c6cb'
  msg.textContent = text
  msg.classList.remove('hidden')
}

function selectStudent(studentName, classId, className, homeClass, studentId, remark = '') {
  selectedClassId = classId
  selectedStudentId = studentId
  input.value = studentName
  const homeLabel = homeClass ? `${homeClass} · ` : ''
  const remarkBadge = remark ? `<span class="ml-2 px-2 py-0.5 text-[10px] font-semibold rounded-full bg-amber-100 text-amber-700 border border-amber-200">${esc(remark)}</span>` : ''
  selectedText.innerHTML = `已选择：<strong>${esc(studentName)}</strong>（${esc(homeLabel)}${esc(className)}）${remarkBadge}`
  selectedInfo.classList.remove('hidden')
  suggestions.style.display = 'none'
  suggestions.innerHTML = ''
  document.getElementById('clearSelection').classList.remove('hidden')
}

document.getElementById('clearSelection').addEventListener('click', () => {
  selectedClassId = null
  input.value = ''
  selectedInfo.classList.add('hidden')
  selectedText.textContent = ''
  document.getElementById('clearSelection').classList.add('hidden')
  input.focus()
})

async function fetchSuggestions() {
  const q = input.value.trim()
  if (!q) { suggestions.style.display = 'none'; suggestions.innerHTML = ''; return }
  try {
    const url = '/api/students/match?q=' + encodeURIComponent(q) + (CLASS_ID ? '&classId=' + CLASS_ID : '')
    const res = await fetch(url)
    const data = await res.json()
    suggestions.innerHTML = ''
    if (!data.length) {
      const empty = document.createElement('div')
      empty.style.cssText = 'padding: 14px; text-align: center; font-size: 14px; color: var(--muted);'
      empty.textContent = '未找到匹配学生'
      suggestions.appendChild(empty)
      suggestions.style.display = 'block'
      return
    }
    data.forEach(item => {
      const btn = document.createElement('button')
      btn.type = 'button'
      btn.style.cssText = 'display: block; width: 100%; text-align: left; padding: 10px 14px; font-size: 14px; border: none; background: none; cursor: pointer; border-bottom: 1px solid var(--suggestions-item-border); color: var(--body); transition: background .1s;'
      btn.onmouseover = () => { btn.style.background = 'var(--suggestions-hover)' }
      btn.onmouseout = () => { btn.style.background = '' }
      const remarkBadge = item.remark ? `<span class="ml-2 px-2 py-0.5 text-[10px] font-semibold rounded-full bg-amber-100 text-amber-700 border border-amber-200">${esc(item.remark)}</span>` : ''
      btn.innerHTML = `<span style="font-weight:500; color: var(--ink);">${esc(item.studentName)} ${remarkBadge}</span><span style="color: var(--muted); margin-left: 4px; font-size: 13px;">${esc(item.homeClass ? item.homeClass + ' · ' : '')}${esc(item.className)}</span>`
      btn.addEventListener('click', () => selectStudent(item.studentName, item.classId, item.className, item.homeClass, item.studentId, item.remark))
      suggestions.appendChild(btn)
    })
    suggestions.style.display = 'block'
  } catch (e) {
    suggestions.style.display = 'none'
  }
}

input.addEventListener('input', () => {
  if (selectedClassId !== null) { selectedClassId = null; selectedInfo.classList.add('hidden') }
  clearTimeout(debounceTimer)
  debounceTimer = setTimeout(fetchSuggestions, 200)
})

document.addEventListener('click', e => {
  if (!suggestions.contains(e.target) && e.target !== input) suggestions.style.display = 'none'
})

const signinBtn = document.getElementById('signinBtn')
signinBtn.addEventListener('click', async () => {
  const val = input.value.trim()
  if (!val) { setMessage('请先输入姓名或密码。', false); return }
  if (signinBtn.disabled) return

  signinBtn.disabled = true
  signinBtn.innerHTML = '<svg class="w-4 h-4" style="animation: spin 1s linear infinite;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg> 提交中...'

  try {
    // 先尝试教师密码登录
    const loginRes = await fetch('/api/teacher-login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: val })
    })
    const loginData = await loginRes.json()
    if (loginData.ok) {
      window.location.href = loginData.redirect
      return
    }

    // 密码不匹配，走学生签到
    if (!selectedClassId) { setMessage('请从列表中选择学生', false); return }
    const res = await fetch('/api/signin', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ classId: selectedClassId, student_name: val })
    })
    const data = await res.json()
    setMessage(data.message, data.ok)
    if (data.ok) {
      const now = new Date()
      const pad = n => String(n).padStart(2, '0')
      const signedAt = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())}`
      const match = selectedText.textContent.match(/（(.+)）$/)
      const className = match ? match[1] : ''
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ name: val, className, signedAt, studentId: selectedStudentId }))
      setTimeout(() => {
        document.getElementById('alreadySignedText').textContent =
          `${val}（${className}）已于 ${signedAt} 签到成功`
        alreadySignedPanel.classList.remove('hidden')
        signInForm.classList.add('hidden')
        checkInfoCollection()
      }, 1500)
    }
  } finally {
    signinBtn.disabled = false
    signinBtn.innerHTML = '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg> 提交签到'
  }
})

checkAlreadySigned()
</script>
</body>
</html>
