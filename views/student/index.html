<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% if cls %}{{ cls.name }} - {% endif %}学生签到</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/public/design-system.css">
  <link rel="stylesheet" href="/public/tailwind.min.css">
  <style>
    :root {
      --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
      /* 品牌色别名 - 兼容 design-system.css */
      --brand: var(--brand-600);
      --brand-light: var(--brand-400);
      --brand-dark: var(--brand-700);
      /* 成功色别名 */
      --success: var(--success-500);
      --success-light: var(--success-100);
      --success-dark: var(--success-700);
      /* 错误色别名 */
      --error: var(--error-500);
      --error-light: var(--error-50);
      --error-dark: var(--error-700);
    }

    * {
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      font-family: var(--font-sans);
      background: var(--slate-50);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      margin: 0;
    }

    .container {
      position: relative;
      width: 100%;
      max-width: 460px;
    }

    /* 头部徽章 */
    .header-section {
      text-align: center;
      margin-bottom: 28px;
    }

    .brand-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 14px;
      background: #fff;
      border: 1px solid var(--slate-200);
      border-radius: 100px;
      margin-bottom: 16px;
      transition: all 0.12s ease;
    }

    .brand-badge:hover {
      box-shadow: var(--shadow-sm);
    }

    .brand-badge-icon {
      width: 18px;
      height: 18px;
      color: var(--brand);
    }

    .brand-badge span {
      font-size: 11px;
      font-weight: 600;
      color: var(--slate-600);
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .header-section h1 {
      font-size: 26px;
      font-weight: 700;
      color: var(--slate-900);
      margin: 0 0 8px 0;
      letter-spacing: -0.02em;
    }

    .header-section .subtitle {
      font-size: 14px;
      color: var(--slate-600);
      font-family: var(--font-mono);
      font-weight: 500;
    }

    .header-section .subtitle span {
      color: var(--slate-900);
      font-weight: 600;
    }

    /* 主卡片 */
    .card {
      background: #fff;
      border-radius: 10px;
      padding: 28px;
      box-shadow: var(--shadow-md);
      border: 1px solid var(--slate-200);
    }

    /* 表单样式 */
    .form-group {
      margin-bottom: 18px;
    }

    .form-label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--slate-600);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .input-wrapper {
      position: relative;
    }

    .input-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      width: 16px;
      height: 16px;
      color: var(--slate-400);
      pointer-events: none;
      transition: color 0.15s ease;
    }

    .form-input {
      width: 100%;
      padding: 11px 14px 11px 38px;
      font-size: 14px;
      font-family: var(--font-sans);
      color: var(--slate-800);
      background: var(--slate-50);
      border: 1px solid var(--slate-200);
      border-radius: 8px;
      transition: all 0.15s ease;
      box-sizing: border-box;
    }

    .form-input::placeholder {
      color: var(--slate-400);
    }

    .form-input:hover {
      background: #fff;
      border-color: var(--slate-300);
    }

    .form-input:focus {
      outline: none;
      background: #fff;
      border-color: var(--brand-500);
      box-shadow: 0 0 0 3px var(--brand-100);
    }

    .form-input:focus + .input-icon {
      color: var(--brand);
    }

    /* 下拉建议 */
    .suggestions {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      margin-top: 6px;
      background: #fff;
      border: 1px solid var(--slate-200);
      border-radius: 8px;
      box-shadow: var(--shadow-lg);
      overflow: hidden;
      z-index: 10;
      max-height: 260px;
      overflow-y: auto;
    }

    .suggestion-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 11px 12px;
      cursor: pointer;
      transition: background 0.12s;
      border-bottom: 1px solid var(--slate-50);
      width: 100%;
      text-align: left;
      background: none;
    }

    .suggestion-item:last-child {
      border-bottom: none;
    }

    .suggestion-item:hover {
      background: var(--slate-50);
    }

    .suggestion-item .main {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .suggestion-avatar {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      background: linear-gradient(135deg, var(--brand-400) 0%, var(--brand-600) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 600;
      color: #fff;
      flex-shrink: 0;
    }

    .suggestion-name {
      font-weight: 500;
      color: var(--slate-700);
      font-size: 14px;
    }

    .suggestion-class {
      font-size: 11px;
      color: var(--slate-400);
    }

    .suggestion-chevron {
      width: 14px;
      height: 14px;
      color: var(--slate-300);
      opacity: 0;
      transition: opacity 0.12s;
    }

    .suggestion-item:hover .suggestion-chevron {
      opacity: 1;
    }

    .suggestion-empty {
      padding: 20px 12px;
      text-align: center;
      color: var(--slate-400);
      font-size: 13px;
    }

    /* 已选信息显示 */
    .selected-info {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      background: var(--brand-50);
      border: 1px solid var(--brand-200);
      border-radius: 8px;
      margin-bottom: 16px;
    }

    .selected-info-text {
      font-size: 12px;
      color: var(--slate-700);
      font-weight: 500;
    }

    .selected-info-text strong {
      color: var(--brand-700);
    }

    .btn-clear {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 4px 6px;
      background: transparent;
      border: none;
      color: var(--slate-400);
      font-size: 11px;
      cursor: pointer;
      transition: color 0.12s;
    }

    .btn-clear:hover {
      color: var(--slate-600);
    }

    /* 提交按钮 */
    .btn-submit {
      width: 100%;
      padding: 12px;
      font-size: 14px;
      font-weight: 600;
      font-family: var(--font-sans);
      color: #fff;
      background: var(--brand-600);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.15s ease;
      box-shadow: var(--shadow-sm);
    }

    .btn-submit:hover {
      background: var(--brand-700);
      box-shadow: var(--shadow-md);
    }

    .btn-submit:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* 消息提示 */
    .toast {
      padding: 11px 14px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      margin-top: 14px;
      border: 1px solid transparent;
    }

    .toast-success {
      background: var(--success-100);
      color: var(--success-700);
      border-color: var(--success-100);
    }

    .toast-error {
      background: var(--error-50);
      color: var(--error-700);
      border-color: var(--error-100);
    }

    /* 已签到面板 */
    .signed-panel {
      text-align: center;
      padding: 20px;
    }

    .signed-icon-wrapper {
      width: 64px;
      height: 64px;
      margin: 0 auto 16px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--success-500) 0%, var(--success-700) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: var(--shadow-md);
    }

    .signed-icon {
      width: 32px;
      height: 32px;
      color: #fff;
    }

    .signed-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--slate-800);
      margin: 0 0 6px 0;
    }

    .signed-text {
      font-size: 13px;
      color: var(--slate-500);
      line-height: 1.5;
    }

    /* 信息收集提示 */
    .info-notice {
      margin-top: 16px;
      padding: 14px;
      background: var(--brand-50);
      border: 1px solid var(--brand-200);
      border-radius: 8px;
    }

    .info-notice-header {
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }

    .info-notice-icon {
      width: 18px;
      height: 18px;
      color: var(--brand-600);
      flex-shrink: 0;
    }

    .info-notice-content {
      flex: 1;
    }

    .info-notice-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--slate-700);
      margin: 0 0 3px 0;
    }

    .info-notice-desc {
      font-size: 11px;
      color: var(--slate-500);
      margin: 0 0 10px 0;
    }

    .info-notice-link {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      font-weight: 600;
      color: var(--brand-600);
      text-decoration: none;
      padding: 6px 10px;
      border-radius: 6px;
      background: var(--brand-100);
      transition: background 0.12s;
    }

    .info-notice-link:hover {
      background: var(--brand-200);
    }

    .info-notice-link svg {
      width: 12px;
      height: 12px;
    }

    /* 响应式 */
    @media (max-width: 520px) {
      .card {
        padding: 22px 18px;
      }

      .header-section h1 {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- 头部 -->
    <div class="header-section">
      <div class="brand-badge">
        <svg class="brand-badge-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
        <span>Attendance</span>
      </div>
      <h1>{% if cls %}{{ cls.name }}{% else %}机房签到{% endif %}</h1>
      <p class="subtitle">设备：<span>{{ computer_name }}</span></p>
    </div>

    <!-- 主卡片 -->
    <div class="card">
      <!-- 已签到状态 -->
      <div id="alreadySignedPanel" class="signed-panel hidden">
        <div class="signed-icon-wrapper">
          <svg class="signed-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/>
          </svg>
        </div>
        <h2 class="signed-title">签到成功</h2>
        <p class="signed-text" id="alreadySignedText"></p>
      </div>

      <!-- 信息收集提示 -->
      <div id="infoCollectionPanel" class="info-notice hidden">
        <div class="info-notice-header">
          <svg class="info-notice-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
          </svg>
          <div class="info-notice-content">
            <p class="info-notice-title">需要提交信息</p>
            <p class="info-notice-desc">老师要求提交相关信息，请点击下方按钮完成提交</p>
            <a id="infoSubmitLink" href="#" class="info-notice-link">
              去提交
              <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
              </svg>
            </a>
          </div>
        </div>
      </div>

      <!-- 签到表单 -->
      <div id="signInForm">
        <div class="form-group">
          <label class="form-label">学生姓名</label>
          <div class="input-wrapper">
            <svg class="input-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
            </svg>
            <input
              id="nameInput"
              type="text"
              class="form-input"
              placeholder="请输入姓名搜索..."
              autocomplete="off"
            />
            <div id="suggestions" class="suggestions hidden"></div>
          </div>
        </div>

        <div id="selectedInfo" class="selected-info hidden">
          <span class="selected-info-text" id="selectedText"></span>
          <button id="clearSelection" class="btn-clear">
            <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
            </svg>
            清除
          </button>
        </div>

        <button id="signinBtn" class="btn-submit">
          提交签到
        </button>

        <div id="msg" class="toast hidden"></div>
      </div>
    </div>
  </div>

<script>
const CLASS_ID = {% if cls %}{{ cls.id }}{% else %}null{% endif %}
const STORAGE_KEY = 'signin_record' + (CLASS_ID ? '_' + CLASS_ID : '')

const input = document.getElementById('nameInput')
const suggestions = document.getElementById('suggestions')
const msg = document.getElementById('msg')
const selectedInfo = document.getElementById('selectedInfo')
const selectedText = document.getElementById('selectedText')
const signInForm = document.getElementById('signInForm')
const alreadySignedPanel = document.getElementById('alreadySignedPanel')

let selectedClassId = null
let selectedStudentId = null
let debounceTimer = null

function checkAlreadySigned() {
  const record = localStorage.getItem(STORAGE_KEY)
  if (!record) return
  try {
    const { name, className, signedAt, studentId } = JSON.parse(record)
    document.getElementById('alreadySignedText').textContent =
      `${name}（${className}）已于 ${signedAt} 签到成功`
    selectedStudentId = studentId || null
    alreadySignedPanel.classList.remove('hidden')
    signInForm.classList.add('hidden')
    checkInfoCollection()
  } catch (e) {
    localStorage.removeItem(STORAGE_KEY)
  }
}

async function checkInfoCollection() {
  if (!CLASS_ID) return
  try {
    const res = await fetch(`/api/info-collection?classId=${CLASS_ID}`)
    const data = await res.json()
    if (data.enabled && data.fields && data.fields.length > 0) {
      const record = localStorage.getItem(STORAGE_KEY)
      if (record) {
        const { name } = JSON.parse(record)
        const link = document.getElementById('infoSubmitLink')
        const studentIdParam = selectedStudentId ? `&studentId=${selectedStudentId}` : ''
        link.href = `/student/info-submit?classId=${CLASS_ID}&studentName=${encodeURIComponent(name)}${studentIdParam}`
        document.getElementById('infoCollectionPanel').classList.remove('hidden')
      }
    }
  } catch (e) {
    console.error('Check info collection failed:', e)
  }
}

function setMessage(text, ok = false) {
  msg.className = `toast ${ok ? 'toast-success' : 'toast-error'}`
  msg.textContent = text
  msg.classList.remove('hidden')
}

function selectStudent(studentName, classId, className, homeClass, studentId, remark = '') {
  selectedClassId = classId
  selectedStudentId = studentId
  input.value = studentName
  const homeLabel = homeClass ? `${homeClass} · ` : ''
  const remarkBadge = remark ? `<span class="ml-2 px-2 py-0.5 text-[10px] font-semibold rounded-full bg-amber-100 text-amber-700 border border-amber-200">${remark}</span>` : ''
  selectedText.innerHTML = `已选择：<strong>${studentName}</strong>（${homeLabel}${className}）${remarkBadge}`
  selectedInfo.classList.remove('hidden')
  suggestions.classList.add('hidden')
  suggestions.innerHTML = ''
}

document.getElementById('clearSelection').addEventListener('click', () => {
  selectedClassId = null
  input.value = ''
  selectedInfo.classList.add('hidden')
  selectedText.textContent = ''
  input.focus()
})

async function fetchSuggestions() {
  const q = input.value.trim()
  if (!q) { suggestions.classList.add('hidden'); suggestions.innerHTML = ''; return }
  try {
    const url = '/api/students/match?q=' + encodeURIComponent(q) + (CLASS_ID ? '&classId=' + CLASS_ID : '')
    const res = await fetch(url)
    const data = await res.json()
    suggestions.innerHTML = ''
    if (!data.length) {
      suggestions.innerHTML = '<div class="suggestion-empty">未找到匹配学生</div>'
      suggestions.classList.remove('hidden')
      return
    }
    data.forEach(item => {
      const btn = document.createElement('button')
      btn.type = 'button'
      btn.className = 'suggestion-item'
      const initial = item.studentName.charAt(0).toUpperCase()
      const homeLabel = item.homeClass ? item.homeClass + ' · ' : ''
      const remarkBadge = item.remark ? `<span class="ml-2 px-2 py-0.5 text-[10px] font-semibold rounded-full bg-amber-100 text-amber-700 border border-amber-200">${item.remark}</span>` : ''
      btn.innerHTML = `
        <div class="main">
          <div class="suggestion-avatar">${initial}</div>
          <div>
            <div class="suggestion-name flex items-center flex-wrap">
              ${item.studentName}
              ${remarkBadge}
            </div>
            <div class="suggestion-class">${homeLabel}${item.className}</div>
          </div>
        </div>
        <svg class="suggestion-chevron" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
        </svg>
      `
      btn.addEventListener('click', () => selectStudent(item.studentName, item.classId, item.className, item.homeClass, item.studentId, item.remark))
      suggestions.appendChild(btn)
    })
    suggestions.classList.remove('hidden')
  } catch (e) {
    suggestions.classList.add('hidden')
  }
}

input.addEventListener('input', () => {
  if (selectedClassId !== null) { selectedClassId = null; selectedInfo.classList.add('hidden') }
  clearTimeout(debounceTimer)
  debounceTimer = setTimeout(fetchSuggestions, 200)
})

document.addEventListener('click', e => {
  if (!suggestions.contains(e.target) && e.target !== input) suggestions.classList.add('hidden')
})

const signinBtn = document.getElementById('signinBtn')
signinBtn.addEventListener('click', async () => {
  const val = input.value.trim()
  if (!val) { setMessage('请先输入姓名。', false); return }
  if (signinBtn.disabled) return

  signinBtn.disabled = true
  signinBtn.textContent = '提交中…'

  try {
    const loginRes = await fetch('/api/teacher-login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: val })
    })
    const loginData = await loginRes.json()
    if (loginData.ok) {
      window.location.href = loginData.redirect
      return
    }

    if (!selectedClassId) { setMessage('请从列表中选择学生', false); return }
    const res = await fetch('/api/signin', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ classId: selectedClassId, student_name: val })
    })
    const data = await res.json()
    setMessage(data.message, data.ok)
    if (data.ok) {
      const now = new Date()
      const pad = n => String(n).padStart(2, '0')
      const signedAt = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())}`
      const match = selectedText.textContent.match(/（(.+)）$/)
      const className = match ? match[1] : ''
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ name: val, className, signedAt, studentId: selectedStudentId }))
      setTimeout(() => {
        document.getElementById('alreadySignedText').textContent =
          `${val}（${className}）已于 ${signedAt} 签到成功`
        alreadySignedPanel.classList.remove('hidden')
        signInForm.classList.add('hidden')
        checkInfoCollection()
      }, 1500)
    }
  } finally {
    signinBtn.disabled = false
    signinBtn.textContent = '提交签到'
  }
})

checkAlreadySigned()
</script>
</body>
</html>
