<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% if cls %}{{ cls.name }} - {% endif %}学生签到</title>
  <link rel="stylesheet" href="/public/tailwind.min.css">
  <style>
    :root {
      --page-bg:#eef3fb;
      --card-bg:rgba(255,255,255,.96);
      --card-border:rgba(203,213,225,.56);
      --card-shadow:0 22px 50px rgba(148,163,184,.18);
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
      background:
        radial-gradient(circle at top left, rgba(255,255,255,.9), transparent 28%),
        radial-gradient(circle at top right, rgba(191,219,254,.35), transparent 24%),
        linear-gradient(180deg, #f8fbff 0%, var(--page-bg) 100%);
    }
    #suggestions { max-height: 200px; overflow-y: auto; }
    .sign-card {
      border-radius:22px;
      border:1px solid var(--card-border);
      background:var(--card-bg);
      box-shadow:var(--card-shadow);
      padding:24px;
    }
    .field-label {
      display:block;
      margin-bottom:8px;
      font-size:14px;
      line-height:1.2;
      font-weight:600;
      color:#334155;
    }
    .field-input {
      width:100%;
      padding:10px 16px;
      border-radius:14px;
      border:1px solid #e2e8f0;
      font-size:16px;
      line-height:1.2;
      color:#334155;
      background:#fff;
      transition:border-color .15s ease, box-shadow .15s ease;
    }
    .field-input::placeholder { color:#cbd5e1; }
    .field-input:focus {
      outline:none;
      border-color:#c7d2fe;
      box-shadow:0 0 0 4px rgba(79,70,229,.08);
    }
    .submit-btn {
      width:100%;
      margin-top:0;
      padding:10px 16px;
      border:none;
      border-radius:14px;
      background:linear-gradient(135deg, #6366f1 0%, #5b6ee8 42%, #4f7ae8 100%);
      color:#fff;
      font-size:16px;
      line-height:1;
      font-weight:600;
      letter-spacing:.01em;
      transition:transform .15s ease, box-shadow .15s ease, opacity .15s ease;
      box-shadow:0 12px 22px rgba(99,102,241,.14);
    }
    .submit-btn:hover { transform:translateY(-1px); box-shadow:0 16px 26px rgba(99,102,241,.17); }
    .submit-btn:disabled { opacity:.6; cursor:not-allowed; transform:none; box-shadow:none; }
    .status-panel {
      text-align:center;
      padding:20px 16px;
      border-radius:16px;
      border:1px solid #bbf7d0;
      background:linear-gradient(180deg, rgba(240,253,244,.96), rgba(236,253,245,.84));
    }
    .floating-note {
      margin-top:16px;
      padding:12px 14px;
      border-radius:14px;
      font-size:14px;
      line-height:1.5;
    }
    @media (max-width: 640px) {
      .sign-card { padding:20px; border-radius:20px; }
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-md">

    <div class="text-center mb-8">
      <h1 class="text-2xl font-semibold text-slate-800">
        {% if cls %}{{ cls.name }}{% else %}机房签到{% endif %}
      </h1>
      <p class="text-sm text-slate-400 mt-1">当前设备：<span class="font-mono text-slate-500">{{ computer_name }}</span></p>
      {% if not cls %}
      <p class="text-xs text-amber-500 mt-1">未指定班级，将搜索全部学生</p>
      {% endif %}
    </div>

    <div class="sign-card">

      <!-- 已签到状态 -->
      <div id="alreadySignedPanel" class="status-panel hidden">
        <div class="inline-flex items-center justify-center w-12 h-12 rounded-full bg-emerald-100 mb-3">
          <svg class="w-6 h-6 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
          </svg>
        </div>
        <p class="text-sm font-medium text-emerald-700" id="alreadySignedText"></p>
        <p class="text-xs text-slate-400 mt-1">本设备已完成签到，如需重新签到请联系老师</p>
      </div>

      <!-- 签到表单 -->
      <div id="signInForm">
        <div class="mb-4 relative">
          <label class="field-label">姓名</label>
          <input id="nameInput" type="text" autocomplete="off" placeholder="请输入姓名片段搜索"
            class="field-input" />
          <div id="suggestions"
            class="absolute z-10 w-full mt-1 bg-white border border-slate-100 rounded-xl shadow-lg overflow-hidden hidden">
          </div>
        </div>

        <div id="selectedInfo" class="floating-note hidden mb-4 bg-indigo-50 border border-indigo-100 text-indigo-700">
          <span id="selectedText"></span>
          <button id="clearSelection" class="ml-2 text-indigo-400 hover:text-indigo-600 transition text-xs">✕ 重新选择</button>
        </div>

        <button id="signinBtn" class="submit-btn">
          提交签到
        </button>

        <div id="msg" class="floating-note hidden font-medium"></div>
      </div>

    </div>

  </div>

<script>
const CLASS_ID = {% if cls %}{{ cls.id }}{% else %}null{% endif %}
const STORAGE_KEY = 'signin_record' + (CLASS_ID ? '_' + CLASS_ID : '')

const input = document.getElementById('nameInput')
const suggestions = document.getElementById('suggestions')
const msg = document.getElementById('msg')
const selectedInfo = document.getElementById('selectedInfo')
const selectedText = document.getElementById('selectedText')
const signInForm = document.getElementById('signInForm')
const alreadySignedPanel = document.getElementById('alreadySignedPanel')

let selectedClassId = null
let debounceTimer = null

function checkAlreadySigned() {
  const record = localStorage.getItem(STORAGE_KEY)
  if (!record) return
  try {
    const { name, className, signedAt } = JSON.parse(record)
    document.getElementById('alreadySignedText').textContent =
      `${name}（${className}）已于 ${signedAt} 签到成功`
    alreadySignedPanel.classList.remove('hidden')
    signInForm.classList.add('hidden')
  } catch (e) {
    localStorage.removeItem(STORAGE_KEY)
  }
}

function setMessage(text, ok = false) {
  msg.className = `floating-note font-medium ${ok
    ? 'bg-emerald-50 text-emerald-700 border border-emerald-100'
    : 'bg-red-50 text-red-600 border border-red-100'}`
  msg.textContent = text
  msg.classList.remove('hidden')
}

function selectStudent(studentName, classId, className, homeClass) {
  selectedClassId = classId
  input.value = studentName
  const homeLabel = homeClass ? `${homeClass} · ` : ''
  selectedText.textContent = `已选择：${studentName}（${homeLabel}${className}）`
  selectedInfo.classList.remove('hidden')
  suggestions.classList.add('hidden')
  suggestions.innerHTML = ''
}

document.getElementById('clearSelection').addEventListener('click', () => {
  selectedClassId = null
  input.value = ''
  selectedInfo.classList.add('hidden')
  selectedText.textContent = ''
  input.focus()
})

async function fetchSuggestions() {
  const q = input.value.trim()
  if (!q) { suggestions.classList.add('hidden'); suggestions.innerHTML = ''; return }
  try {
    const url = '/api/students/match?q=' + encodeURIComponent(q) + (CLASS_ID ? '&classId=' + CLASS_ID : '')
    const res = await fetch(url)
    const data = await res.json()
    suggestions.innerHTML = ''
    if (!data.length) {
      const empty = document.createElement('div')
      empty.className = 'px-4 py-3 text-sm text-slate-400 text-center'
      empty.textContent = '未找到匹配学生'
      suggestions.appendChild(empty)
      suggestions.classList.remove('hidden')
      return
    }
    data.forEach(item => {
      const btn = document.createElement('button')
      btn.type = 'button'
      btn.className = 'w-full text-left px-4 py-2.5 text-sm text-slate-700 hover:bg-slate-50 transition border-b border-slate-50 last:border-0'
      btn.innerHTML = `<span class="font-medium">${item.studentName}</span><span class="text-slate-400 ml-1">（${item.homeClass ? item.homeClass + ' · ' : ''}${item.className}）</span>`
      btn.addEventListener('click', () => selectStudent(item.studentName, item.classId, item.className, item.homeClass))
      suggestions.appendChild(btn)
    })
    suggestions.classList.remove('hidden')
  } catch (e) {
    suggestions.classList.add('hidden')
  }
}

input.addEventListener('input', () => {
  if (selectedClassId !== null) { selectedClassId = null; selectedInfo.classList.add('hidden') }
  clearTimeout(debounceTimer)
  debounceTimer = setTimeout(fetchSuggestions, 200)
})

document.addEventListener('click', e => {
  if (!suggestions.contains(e.target) && e.target !== input) suggestions.classList.add('hidden')
})

const signinBtn = document.getElementById('signinBtn')
signinBtn.addEventListener('click', async () => {
  const val = input.value.trim()
  if (!val) { setMessage('请先输入姓名。'); return }
  if (signinBtn.disabled) return

  signinBtn.disabled = true
  signinBtn.textContent = '提交中…'

  try {
    // 先尝试教师/管理员口令登录
    const loginRes = await fetch('/api/teacher-login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: val })
    })
    const loginData = await loginRes.json()
    if (loginData.ok) {
      window.location.href = loginData.redirect
      return
    }

    // 否则走学生签到流程
    if (!selectedClassId) { setMessage('请从列表中选择学生'); return }
    const res = await fetch('/api/signin', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ classId: selectedClassId, student_name: val })
    })
    const data = await res.json()
    setMessage(data.message, data.ok)
    if (data.ok) {
      const now = new Date()
      const pad = n => String(n).padStart(2, '0')
      const signedAt = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())}`
      const match = selectedText.textContent.match(/（(.+)）$/)
      const className = match ? match[1] : ''
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ name: val, className, signedAt }))
      setTimeout(() => {
        document.getElementById('alreadySignedText').textContent =
          `${val}（${className}）已于 ${signedAt} 签到成功`
        alreadySignedPanel.classList.remove('hidden')
        signInForm.classList.add('hidden')
      }, 1500)
    }
  } finally {
    signinBtn.disabled = false
    signinBtn.textContent = '提交签到'
  }
})

checkAlreadySigned()
</script>
</body>
</html>
