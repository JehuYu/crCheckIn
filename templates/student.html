<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>学生签到</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
      <div class="card shadow-sm">
        <div class="card-body p-4">
          <h3 class="mb-3">机房学生签到</h3>
          <p class="text-muted">当前设备标识：<strong id="computerName">{{ computer_name }}</strong></p>
          <div class="mb-3 position-relative">
            <label class="form-label">姓名</label>
            <input id="nameInput" type="text" class="form-control" autocomplete="off" placeholder="请输入姓名">
            <div id="suggestions" class="list-group position-absolute w-100" style="z-index:1000;"></div>
          </div>
          <button id="signinBtn" class="btn btn-primary w-100">提交签到</button>
          <div id="msg" class="alert mt-3 d-none"></div>
          <a class="btn btn-link mt-2 p-0" href="/teacher">进入教师管理端</a>
        </div>
      </div>
    </div>
  </div>
</div>
<script>
const input = document.getElementById('nameInput');
const suggestions = document.getElementById('suggestions');
const msg = document.getElementById('msg');


function setMessage(text, ok=false) {
  msg.className = `alert mt-3 ${ok ? 'alert-success' : 'alert-danger'}`;
  msg.textContent = text;
  msg.classList.remove('d-none');
}

async function fetchSuggestions() {
  const q = input.value.trim();
  if (!q) {
    suggestions.innerHTML = '';
    return;
  }
  const res = await fetch(`/api/students?q=${encodeURIComponent(q)}`);
  const data = await res.json();
  suggestions.innerHTML = '';
  data.students.forEach(name => {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'list-group-item list-group-item-action';
    btn.textContent = name;
    btn.onclick = () => {
      input.value = name;
      suggestions.innerHTML = '';
    };
    suggestions.appendChild(btn);
  });
}

input.addEventListener('input', fetchSuggestions);
document.addEventListener('click', (e) => {
  if (!suggestions.contains(e.target) && e.target !== input) suggestions.innerHTML = '';
});

const signinBtn = document.getElementById('signinBtn');

signinBtn.addEventListener('click', async () => {
  const student_name = input.value.trim();
  if (!student_name) {
    setMessage('请先输入姓名。');
    return;
  }
  if (signinBtn.disabled) return;
  signinBtn.disabled = true;
  signinBtn.textContent = '提交中...';
  try {
    const res = await fetch('/api/signin', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({student_name})
    });
    const data = await res.json();
    setMessage(data.message, data.ok);
    if (data.ok) input.value = '';
  } finally {
    signinBtn.disabled = false;
    signinBtn.textContent = '提交签到';
  }
});
</script>
</body>
</html>
