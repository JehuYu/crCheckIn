<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>教师管理端</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="mb-0">机房签到管理</h2>
    <form method="post" action="/teacher/logout" class="d-flex gap-2">
      <button type="button" class="btn btn-outline-primary" data-bs-toggle="collapse" data-bs-target="#pwdPanel">修改密码</button>
      <button type="submit" class="btn btn-outline-secondary">退出登录</button>
    </form>
  </div>

  <div id="pwdPanel" class="collapse mb-3">
    <div class="card">
      <div class="card-body">
        <h6>修改教师密码</h6>
        <div class="row g-2 align-items-end">
          <div class="col-md-4"><label class="form-label">旧密码</label><input id="oldPwd" type="password" class="form-control"></div>
          <div class="col-md-4"><label class="form-label">新密码</label><input id="newPwd" type="password" class="form-control"></div>
          <div class="col-md-4"><button id="changePwdBtn" class="btn btn-primary w-100">确认修改</button></div>
        </div>
      </div>
    </div>
  </div>

  <div class="row g-3 mb-3">
    <div class="col-md-4"><div class="card"><div class="card-body">总人数：<strong id="totalCount">0</strong></div></div></div>
    <div class="col-md-4"><div class="card"><div class="card-body">已到：<strong id="signedCount">0</strong></div></div></div>
    <div class="col-md-4"><div class="card"><div class="card-body">未到：<strong id="absentCount">0</strong></div></div></div>
  </div>

  <div class="card mb-3">
    <div class="card-body">
      <h5>签到时间段设置</h5>
      <div class="row g-2 align-items-end">
        <div class="col-md-4"><label class="form-label">开始时间</label><input id="startTime" type="datetime-local" class="form-control"></div>
        <div class="col-md-4"><label class="form-label">结束时间</label><input id="endTime" type="datetime-local" class="form-control"></div>
        <div class="col-md-4"><button id="saveWindow" class="btn btn-outline-primary w-100">保存时间段</button></div>
      </div>
      <p class="text-muted mt-2 mb-0" id="windowText">当前时间段：不限</p>
    </div>
  </div>

  <div class="card mb-3">
    <div class="card-body">
      <h5>名单导入 / 记录导出</h5>
      <form id="importForm" class="row g-2 align-items-end">
        <div class="col-md-8"><input type="file" name="file" class="form-control" accept=".xlsx,.xlsm"></div>
        <div class="col-md-2"><button class="btn btn-success w-100" type="submit">导入名单</button></div>
        <div class="col-md-2"><a class="btn btn-secondary w-100" href="/api/export">导出记录</a></div>
      </form>
    </div>
  </div>

  <div class="d-flex gap-2 mb-3">
    <button id="resetBtn" class="btn btn-danger">重置签到</button>
    <button id="clearRosterBtn" class="btn btn-outline-danger">清空当前名单</button>
    <a href="/student" class="btn btn-outline-dark">打开学生端</a>
    <a href="/teacher/seats" class="btn btn-outline-primary">查看座位情况</a>
  </div>

  <div id="msg" class="alert d-none"></div>

  <div class="card">
    <div class="card-body">
      <h5 class="mb-3">学生签到名单（含状态）</h5>
      <div class="table-responsive">
        <table class="table table-striped mb-0">
          <thead><tr><th>姓名</th><th>状态</th><th>计算机IP</th><th>签到时间</th></tr></thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
const msg = document.getElementById('msg');

function notify(text, ok=true) {
  msg.className = `alert ${ok ? 'alert-success' : 'alert-danger'}`;
  msg.textContent = text;
  msg.classList.remove('d-none');
  setTimeout(() => msg.classList.add('d-none'), 2200);
}

async function parseResponse(res) {
  if (res.status === 401) {
    window.location.href = '/teacher/login';
    return null;
  }
  return await res.json();
}

async function refreshStatus() {
  const res = await fetch('/api/status');
  const data = await parseResponse(res);
  if (!data) return;

  document.getElementById('totalCount').textContent = data.total_count;
  document.getElementById('signedCount').textContent = data.signed_count;
  document.getElementById('absentCount').textContent = data.absent_count;
  const windowText = data.window.start || data.window.end
    ? `当前时间段：${data.window.start || '不限'} - ${data.window.end || '不限'}`
    : '当前时间段：不限';
  document.getElementById('windowText').textContent = windowText;

  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = '';

  const computerNameCount = {};
  data.roster.forEach(r => {
    const name = (r.computer_name || '').trim();
    if (name && name !== '-') {
      computerNameCount[name] = (computerNameCount[name] || 0) + 1;
    }
  });

  data.roster.forEach(r => {
    const tr = document.createElement('tr');
    const statusClass = r.status === '已签到' ? 'text-success' : 'text-secondary';
    const machineName = (r.computer_name || '').trim();
    const computerNameClass = computerNameCount[machineName] > 1 ? 'text-danger fw-bold' : '';
    tr.innerHTML = `<td>${r.student_name}</td><td class="${statusClass}">${r.status}</td><td class="${computerNameClass}">${r.computer_name}</td><td>${r.signed_at}</td>`;
    tbody.appendChild(tr);
  });
}

document.getElementById('resetBtn').addEventListener('click', async () => {
  const res = await fetch('/api/reset', {method: 'POST'});
  const data = await parseResponse(res);
  if (!data) return;
  notify(data.message, data.ok);
  refreshStatus();
});

document.getElementById('clearRosterBtn').addEventListener('click', async () => {
  if (!confirm('确认清空当前名单及全部签到记录吗？该操作不可恢复。')) return;
  const res = await fetch('/api/clear-roster', {method: 'POST'});
  const data = await parseResponse(res);
  if (!data) return;
  notify(data.message, data.ok);
  refreshStatus();
});

document.getElementById('changePwdBtn').addEventListener('click', async () => {
  const old_password = document.getElementById('oldPwd').value;
  const new_password = document.getElementById('newPwd').value;
  const res = await fetch('/api/change-password', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({old_password, new_password})
  });
  const data = await parseResponse(res);
  if (!data) return;
  notify(data.message, data.ok);
  if (data.ok) {
    document.getElementById('oldPwd').value = '';
    document.getElementById('newPwd').value = '';
  }
});

document.getElementById('saveWindow').addEventListener('click', async () => {
  const start_time = document.getElementById('startTime').value || null;
  const end_time = document.getElementById('endTime').value || null;
  const res = await fetch('/api/window', {
    method:'POST',
    headers:{'Content-Type': 'application/json'},
    body: JSON.stringify({start_time, end_time})
  });
  const data = await parseResponse(res);
  if (!data) return;
  notify(data.message, data.ok);
  refreshStatus();
});

document.getElementById('importForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const formData = new FormData(e.target);
  const res = await fetch('/api/import', {method:'POST', body: formData});
  const data = await parseResponse(res);
  if (!data) return;
  notify(data.message, data.ok);
  refreshStatus();
});

refreshStatus();
setInterval(refreshStatus, 4000);
</script>
</body>
</html>
